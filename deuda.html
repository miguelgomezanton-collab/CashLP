<script type="module">
// ════════════════════════════════════════════════════════
// FIREBASE ADAPTER
// ════════════════════════════════════════════════════════
// ════════════════════════════════════════════════════════
// FIREBASE ADAPTER — sincroniza localStorage ↔ Firestore
// Incluir este bloque al inicio del <script> en cada HTML
// ════════════════════════════════════════════════════════

const _FB_CFG = {
  apiKey: "AIzaSyAB7JtnIUPpenmeSvmbXB3coLMcrv59Gsc",
  authDomain: "lpcash-2a547.firebaseapp.com",
  projectId: "lpcash-2a547",
  storageBucket: "lpcash-2a547.firebasestorage.app",
  messagingSenderId: "283983626636",
  appId: "1:283983626636:web:775a3d0df7e89f9b4696a9"
};

let _db = null;
let _fbReady = false;

async function _initFB() {
  if (_db) return _db;
  try {
    const { initializeApp, getApps } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const { getFirestore, doc, getDoc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const app = getApps().length ? getApps()[0] : initializeApp(_FB_CFG);
    _db = { fs: getFirestore(app), doc, getDoc, setDoc };
    _fbReady = true;
    return _db;
  } catch(e) {
    console.warn('Firebase no disponible, usando solo localStorage', e);
    return null;
  }
}

// Sincronizar al iniciar — descarga datos de Firestore a localStorage
async function fbSync() {
  const fb = await _initFB();
  if (!fb) return;
  const keys = ['lp_movs_v3','lp_imports_v3','lp_rules_v3','lp_ingresos_v1','lp_deuda_v1'];
  for (const k of keys) {
    try {
      const snap = await fb.getDoc(fb.doc(fb.fs, 'lpcash', k));
      if (snap.exists()) {
        const remoto = snap.data().value;
        const local  = localStorage.getItem(k);
        // Si remoto es más reciente (tiene más datos), lo usamos
        const remotoStr = JSON.stringify(remoto);
        if (remotoStr !== local) {
          localStorage.setItem(k, remotoStr);
        }
      }
    } catch(e) { console.warn('sync error', k, e); }
  }
}

// Guardar en localStorage + Firestore
async function fbSave(key, value) {
  const str = JSON.stringify(value);
  localStorage.setItem(key, str);
  const fb = await _initFB();
  if (!fb) return;
  try {
    await fb.setDoc(fb.doc(fb.fs, 'lpcash', key), { value });
  } catch(e) { console.warn('fbSave error', key, e); }
}

// Wrapper: reemplaza localStorage.setItem para las claves LP
const _origSet = localStorage.setItem.bind(localStorage);
const LP_KEYS = new Set(['lp_movs_v3','lp_imports_v3','lp_rules_v3','lp_ingresos_v1','lp_deuda_v1']);

localStorage.setItem = function(key, value) {
  _origSet(key, value);
  if (LP_KEYS.has(key)) {
    // Guardar en Firebase de forma asíncrona
    _initFB().then(fb => {
      if (!fb) return;
      try {
        const parsed = JSON.parse(value);
        fb.setDoc(fb.doc(fb.fs, 'lpcash', key), { value: parsed });
      } catch(e) { /* ignorar */ }
    });
  }
};

window.addEventListener('DOMContentLoaded', () => { fbSync(); });
</script>

<script>
const K='lp_deuda_v1', KM='lp_movs_v3';
const ld=()=>{try{return JSON.parse(localStorage.getItem(K)||'[]')}catch{return[]}};
const sd=d=>localStorage.setItem(K,JSON.stringify(d));
const lm=()=>{try{return JSON.parse(localStorage.getItem(KM)||'{}')}catch{return{}}};
const fE=n=>new Intl.NumberFormat('es-ES',{minimumFractionDigits:0,maximumFractionDigits:0}).format(Math.round(Math.abs(n)))+'€';
const fD=s=>{if(!s)return'—';const p=s.split('-');return`${p[2]}/${p[1]}/${p[0]}`};
const td=()=>new Date().toISOString().split('T')[0];
const TC={'Póliza':{bg:'#eef3fc',t:'#1a4a8a'},'Préstamo':{bg:'#fdf5e6',t:'#9a5a00'},'Cobro Ágil':{bg:'#eaf4ee',t:'#1a6b3c'},'Confirming':{bg:'#f2eef9',t:'#5b2d8a'},'Impuestos':{bg:'#fdf0ee',t:'#c0392b'},'ICO':{bg:'#f5f5f3',t:'#6b6b65'},'Otro':{bg:'#f5f5f3',t:'#6b6b65'}};
const BK={'BSCH':['0049','santander','bsch','0610645','0610424','0608372'],'BBVA':['bbva','cargo por amortizacion de prestamo/credito bbva','abono por disposicion'],'Sabadell':['sabadell','confirming','pago proveedores'],'Bankinter':['bankinter','anticipo fras','510012903'],'Caixabank':['caixa'],'AEAT':['abonare','aplazamiento impuesto']};
let editId=null,vn=0,vm='all';

window.onload=()=>{buildSB();showAll()};

function buildSB(){
  const ls=ld();
  if(!ls.length){document.getElementById('sb-lines').innerHTML='<div style="padding:20px 16px;text-align:center;font-size:11px;color:var(--ink-faint)">Sin líneas</div>';return}
  const by={};ls.forEach(l=>{if(!by[l.banco])by[l.banco]=[];by[l.banco].push(l)});
  let h='';
  Object.entries(by).forEach(([b,ls])=>{
    h+=`<div class="sb-sec">${b}</div>`;
    ls.forEach(l=>{const tc=TC[l.tipo]||TC['Otro'];h+=`<div class="sb-line" onclick="openFormEdit('${l.id}')"><span class="sb-line-name">${l.nombre}</span><span class="sb-type" style="background:${tc.bg};color:${tc.t}">${l.tipo}</span></div>`});
  });
  document.getElementById('sb-lines').innerHTML=h;
}

function showAll(){
  vm='all';
  document.getElementById('btn-all').classList.add('active');
  document.getElementById('btn-cal').classList.remove('active');
  renderAll();
}

function renderAll(){
  const ls=ld(),movs=lm(),now=new Date();
  document.getElementById('nav-right').textContent='Vista general';
  if(!ls.length){document.getElementById('main-inner').innerHTML='<div class="page-header"><div><div class="page-title">Deuda Financiera</div></div><button class="btn" onclick="openForm()" style="font-size:11px">+ Nueva línea</button></div><div class="empty"><div class="empty-icon">🏦</div><div class="empty-title">Sin líneas registradas</div><div class="empty-sub">Pulsa "+ Nueva línea" para empezar.</div></div>';return}
  const totalS=ls.reduce((s,l)=>s+(l.saldo||0),0);
  const totalL=ls.reduce((s,l)=>s+(l.limite||0),0);
  const totalC=ls.reduce((s,l)=>s+(l.cuota||0),0);
  const in30=new Date(now);in30.setDate(in30.getDate()+30);
  const v30=ls.flatMap(l=>(l.vencimientos||[]).filter(v=>{const d=new Date(v.fecha);return d>=now&&d<=in30}));
  const t30=v30.reduce((s,v)=>s+(v.importe||0),0);
  const allM=Object.values(movs).flatMap(m=>Object.values(m||{}));
  const gR=banco=>{const kws=BK[banco]||[banco.toLowerCase()];return allM.filter(m=>['Dev. deuda bancaria','Financiación'].includes(m.cat)&&kws.some(k=>(m.concepto||'').toLowerCase().includes(k)))};
  const cards=ls.map(l=>{
    const tc=TC[l.tipo]||TC['Otro'];
    const pct=l.limite>0?Math.min((l.saldo/l.limite)*100,100):0;
    const rm=gR(l.banco);
    const ra=Math.abs(rm.filter(m=>m.cat==='Dev. deuda bancaria'&&m.importe<0).reduce((s,m)=>s+m.importe,0));
    const rf=rm.filter(m=>m.cat==='Financiación'&&m.importe>0).reduce((s,m)=>s+m.importe,0);
    const nv=(l.vencimientos||[]).filter(v=>v.fecha>=td()).sort((a,b)=>a.fecha.localeCompare(b.fecha))[0];
    const bc=pct>80?'var(--red)':pct>50?'var(--amber)':'var(--blue)';
    return`<div class="debt-card" onclick="openFormEdit('${l.id}')">
      <div class="dcard-head"><div><div class="dcard-name">${l.nombre}</div><div class="dcard-banco">${l.banco}</div></div><span class="dcard-type" style="background:${tc.bg};color:${tc.t}">${l.tipo}</span></div>
      <div class="dcard-body">
        <div class="drow"><span class="drow-label">Saldo vivo</span><span class="drow-val" style="color:var(--red);font-size:15px">${fE(l.saldo||0)}</span></div>
        ${l.limite?`<div class="drow"><span class="drow-label">Límite</span><span class="drow-val">${fE(l.limite)}</span></div>`:''}
        ${l.cuota?`<div class="drow"><span class="drow-label">Cuota mensual</span><span class="drow-val" style="color:var(--amber)">${fE(l.cuota)}</span></div>`:''}
        ${nv?`<div class="drow"><span class="drow-label">Próx. vencimiento</span><span class="drow-val" style="color:var(--amber)">${fD(nv.fecha)} · ${fE(nv.importe)}</span></div>`:''}
        ${l.vencFinal?`<div class="drow"><span class="drow-label">Vence</span><span class="drow-val">${fD(l.vencFinal)}</span></div>`:''}
        ${ra>0||rf>0?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;gap:12px">${rf>0?`<span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--green)">+${fE(rf)} financiado</span>`:''}${ra>0?`<span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--red)">−${fE(ra)} amortizado</span>`:''}</div>`:''}
        ${l.limite?`<div class="dprog"><div class="dprog-hdr"><span>Utilización</span><span>${pct.toFixed(0)}%</span></div><div class="dtrack"><div class="dfill" style="width:${pct.toFixed(1)}%;background:${bc}"></div></div></div>`:''}
        ${l.notas?`<div style="margin-top:8px;font-size:11px;color:var(--ink-faint);font-style:italic">${l.notas}</div>`:''}
      </div>
    </div>`;
  }).join('');
  document.getElementById('main-inner').innerHTML=`
    <div class="page-header"><div><div class="page-title">Deuda Financiera</div><div class="page-sub">${ls.length} línea${ls.length!==1?'s':''} · actualizado manualmente</div></div><button class="btn" onclick="openForm()" style="font-size:11px">+ Nueva línea</button></div>
    <div class="sum-bar">
      <div class="sum-item"><div class="sum-label">Deuda total viva</div><div class="sum-val" style="color:var(--red)">${fE(totalS)}</div><div class="sum-sub">suma saldos vivos</div></div>
      <div class="sum-item"><div class="sum-label">Límite total</div><div class="sum-val">${fE(totalL)}</div><div class="sum-sub">${totalL>0?((totalS/totalL)*100).toFixed(0)+'% utilizado':'—'}</div></div>
      <div class="sum-item"><div class="sum-label">Cuota mensual fija</div><div class="sum-val" style="color:var(--amber)">${totalC>0?fE(totalC):'—'}</div><div class="sum-sub">préstamos fijos</div></div>
      <div class="sum-item"><div class="sum-label">Vence en 30 días</div><div class="sum-val" style="color:${t30>0?'var(--red)':'var(--ink-faint)'}">${t30>0?fE(t30):'—'}</div><div class="sum-sub">${v30.length>0?v30.length+' vencto'+( v30.length!==1?'s':''):'Sin venctos.'}</div></div>
    </div>
    <div class="debt-grid">${cards}</div>`;
}

function showCalendar(days='90'){
  vm='cal';
  document.getElementById('btn-cal').classList.add('active');
  document.getElementById('btn-all').classList.remove('active');
  renderCal(days);
}

function renderCal(days){
  const ls=ld(),now=new Date();
  const end=new Date(now);if(days!=='all')end.setDate(end.getDate()+parseInt(days));
  document.getElementById('nav-right').textContent='Calendario vencimientos';
  const all=[];
  ls.forEach(l=>(l.vencimientos||[]).forEach(v=>all.push({...v,linea:l.nombre,banco:l.banco,tipo:l.tipo,lid:l.id})));
  const fil=all.filter(v=>days==='all'||(new Date(v.fecha)>=new Date(now.getFullYear(),now.getMonth(),1)&&new Date(v.fecha)<=end)).sort((a,b)=>a.fecha.localeCompare(b.fecha));
  const tot=fil.reduce((s,v)=>s+(v.importe||0),0);
  const in7=new Date(now);in7.setDate(in7.getDate()+7);
  const in30=new Date(now);in30.setDate(in30.getDate()+30);
  const past=fil.filter(v=>v.fecha<td());
  const rows=fil.map(v=>{
    const d=new Date(v.fecha),ip=v.fecha<td(),iu=!ip&&d<=in7;
    const tc=TC[v.tipo]||TC['Otro'];
    const dt=Math.round((d-now)/86400000);
    return`<tr class="${ip?'past':iu?'urgent':''}">
      <td class="mono">${fD(v.fecha)}</td><td style="font-weight:600">${v.linea}</td><td style="font-size:11px;color:var(--ink-dim)">${v.banco}</td>
      <td><span class="badge" style="background:${tc.bg};color:${tc.t}">${v.tipo}</span></td>
      <td style="text-align:right;font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--red)">${fE(v.importe||0)}</td>
      <td style="text-align:right;font-family:'IBM Plex Mono',monospace;font-size:11px;color:${ip?'var(--ink-faint)':iu?'var(--red)':'var(--ink-dim)'}">${ip?'Pasado':dt===0?'HOY':dt+' días'}</td>
    </tr>`;
  }).join('')||`<tr><td colspan="6" style="text-align:center;padding:28px;color:var(--ink-faint);font-size:12px">Sin vencimientos en este período</td></tr>`;
  const v7=fil.filter(v=>!past.includes(v)&&new Date(v.fecha)<=in7);
  const v30=fil.filter(v=>!past.includes(v)&&new Date(v.fecha)<=in30);
  document.getElementById('main-inner').innerHTML=`
    <div class="page-header"><div><div class="page-title">Calendario de Vencimientos</div><div class="page-sub">${fil.length} vencimientos · total ${fE(tot)}</div></div></div>
    <div class="sum-bar">
      <div class="sum-item"><div class="sum-label">Total período</div><div class="sum-val" style="color:var(--red)">${fE(tot)}</div><div class="sum-sub">${fil.length} vencimientos</div></div>
      <div class="sum-item"><div class="sum-label">Próximos 7 días</div><div class="sum-val" style="color:${v7.length?'var(--red)':'var(--ink-faint)'}">${v7.length?fE(v7.reduce((s,v)=>s+v.importe,0)):'—'}</div><div class="sum-sub">${v7.length} vencts.</div></div>
      <div class="sum-item"><div class="sum-label">Próximos 30 días</div><div class="sum-val" style="color:var(--amber)">${v30.length?fE(v30.reduce((s,v)=>s+v.importe,0)):'—'}</div><div class="sum-sub">${v30.length} vencts.</div></div>
      <div class="sum-item"><div class="sum-label">Ya vencidos</div><div class="sum-val" style="color:${past.length?'var(--amber)':'var(--ink-faint)'}">${past.length?fE(past.reduce((s,v)=>s+v.importe,0)):'—'}</div><div class="sum-sub">${past.length} ptes.</div></div>
    </div>
    <div class="cal-section">
      <div class="cal-head"><span class="cal-title">VENCIMIENTOS</span>
        <div class="cal-filters">
          <span class="chip ${days==='30'?'on':''}" onclick="renderCal('30')">30d</span>
          <span class="chip ${days==='90'?'on':''}" onclick="renderCal('90')">90d</span>
          <span class="chip ${days==='180'?'on':''}" onclick="renderCal('180')">6m</span>
          <span class="chip ${days==='all'?'on':''}" onclick="renderCal('all')">Todo</span>
        </div>
      </div>
      <table class="ctbl">
        <thead><tr><th>Fecha</th><th>Línea</th><th>Banco</th><th>Tipo</th><th style="text-align:right">Importe</th><th style="text-align:right">Días</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

let vc=0;
function openForm(){
  editId=null;vc=0;
  document.getElementById('form-title').textContent='Nueva línea de deuda';
  document.getElementById('btn-del').style.display='none';
  ['f-banco','f-tipo','f-nombre','f-limite','f-saldo','f-cuota','f-vencfinal','f-notas'].forEach(id=>{const el=document.getElementById(id);if(el.tagName==='SELECT')el.selectedIndex=0;else el.value=''});
  document.getElementById('venc-rows').innerHTML='';
  document.getElementById('form-modal').classList.add('open');
}

function openFormEdit(id){
  const ls=ld(),l=ls.find(x=>x.id===id);if(!l)return;
  editId=id;vc=0;
  document.getElementById('form-title').textContent=`Editar — ${l.nombre}`;
  document.getElementById('btn-del').style.display='block';
  document.getElementById('f-banco').value=l.banco;
  document.getElementById('f-tipo').value=l.tipo;
  document.getElementById('f-nombre').value=l.nombre;
  document.getElementById('f-limite').value=l.limite||'';
  document.getElementById('f-saldo').value=l.saldo||'';
  document.getElementById('f-cuota').value=l.cuota||'';
  document.getElementById('f-vencfinal').value=l.vencFinal||'';
  document.getElementById('f-notas').value=l.notas||'';
  document.getElementById('venc-rows').innerHTML='';
  (l.vencimientos||[]).forEach(v=>addVRow(v.fecha,v.importe));
  document.getElementById('form-modal').classList.add('open');
}

function addVRow(f='',i=''){
  const id=vc++;
  const r=document.createElement('div');r.className='vrow';r.id=`vr-${id}`;
  r.innerHTML=`<input class="finput" type="date" id="vf-${id}" value="${f}" style="flex:1"><input class="finput" type="number" id="vi-${id}" value="${i}" placeholder="Importe €" style="width:130px"><button class="vdel" onclick="document.getElementById('vr-${id}').remove()">×</button>`;
  document.getElementById('venc-rows').appendChild(r);
}

function closeForm(){document.getElementById('form-modal').classList.remove('open');editId=null}

function saveLine(){
  const nombre=document.getElementById('f-nombre').value.trim();
  if(!nombre){alert('Introduce un nombre');return}
  const vencs=[];
  for(let i=0;i<vc;i++){
    const fe=document.getElementById(`vf-${i}`),ie=document.getElementById(`vi-${i}`);
    if(fe&&fe.value)vencs.push({fecha:fe.value,importe:parseFloat(ie?.value)||0});
  }
  const data={id:editId||Date.now().toString(36),banco:document.getElementById('f-banco').value,tipo:document.getElementById('f-tipo').value,nombre,limite:parseFloat(document.getElementById('f-limite').value)||0,saldo:parseFloat(document.getElementById('f-saldo').value)||0,cuota:parseFloat(document.getElementById('f-cuota').value)||0,vencFinal:document.getElementById('f-vencfinal').value||'',notas:document.getElementById('f-notas').value.trim(),vencimientos:vencs,updatedAt:new Date().toISOString()};
  const ls=ld();
  if(editId){const i=ls.findIndex(l=>l.id===editId);if(i>=0)ls[i]=data;}else ls.push(data);
  sd(ls);closeForm();buildSB();
  if(vm==='cal')renderCal('90');else renderAll();
  toast(`"${nombre}" guardado`);
}

function deleteLine(){
  if(!editId)return;
  const ls=ld(),l=ls.find(x=>x.id===editId);
  if(!confirm(`¿Eliminar "${l?.nombre}"?`))return;
  sd(ls.filter(x=>x.id!==editId));closeForm();buildSB();renderAll();toast('Línea eliminada');
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3500)}
</script>
