<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OAF — LPCash</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f7f5; --surface:#fff; --surface2:#f2f2ef; --surface3:#eaeae6;
  --border:#e0dfd9; --border-strong:#c8c7c0;
  --ink:#1a1a18; --ink-dim:#6b6b65; --ink-faint:#a8a8a2;
  --green:#1a6b3c; --green-bg:#eaf4ee; --green-border:#b8ddc6;
  --red:#c0392b; --red-bg:#fdf0ee; --red-border:#f5c0b8;
  --blue:#1a4a8a; --blue-bg:#eef3fc; --blue-border:#b8cef0;
  --amber:#9a5a00; --amber-bg:#fdf5e6;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;font-size:14px;min-height:100vh;display:flex;flex-direction:column}

nav{background:var(--ink);color:white;height:52px;padding:0 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0}
.nav-left{display:flex;align-items:center;gap:16px}
.nav-back{font-family:'IBM Plex Mono',monospace;font-size:11px;color:rgba(255,255,255,.45);text-decoration:none;transition:color .15s}
.nav-back:hover{color:rgba(255,255,255,.8)}
.nav-sep{color:rgba(255,255,255,.2)}
.nav-title{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;letter-spacing:.04em}
.nav-right{font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,.35)}

.layout{display:flex;flex:1;min-height:0}

/* SIDEBAR */
.sidebar{width:196px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-head{padding:16px 16px 12px;border-bottom:1px solid var(--border)}
.sb-head-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:2px}
.sb-head-sub{font-size:11px;color:var(--ink-dim)}
.sb-months{flex:1;overflow-y:auto;padding:8px 0}
.sb-year{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);padding:10px 16px 4px}
.sb-month{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;cursor:pointer;font-size:12px;color:var(--ink-dim);border-left:2px solid transparent;transition:background .1s}
.sb-month:hover{background:var(--surface2);color:var(--ink)}
.sb-month.active{background:var(--blue-bg);color:var(--blue);border-left-color:var(--blue);font-weight:600}
.sb-month.has-data{color:var(--ink)}
.sb-badge{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:1px 6px;border-radius:10px;background:var(--surface3);color:var(--ink-faint)}
.sb-month.active .sb-badge{background:var(--blue);color:white}
.sb-month.has-data .sb-badge{background:var(--green-bg);color:var(--green)}

/* MAIN */
.main{flex:1;overflow-y:auto}
.main-inner{max-width:960px;padding:24px 28px 60px}

.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:20px;font-weight:700}
.page-sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-faint);margin-top:5px}

/* SUMMARY BAR */
.summary-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:20px}
.sum-item{background:var(--surface);padding:14px 18px}
.sum-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:5px}
.sum-val{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;line-height:1}
.sum-sub{font-size:11px;color:var(--ink-dim);margin-top:3px}

/* OAF TABLE */
.oaf-wrap{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.oaf-col{background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden}
.oaf-col-header{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--border-strong)}
.oaf-col-title{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.oaf-col-total{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:700}
.oaf-origen .oaf-col-header{background:#eaf4ee;border-bottom-color:#b8ddc6}
.oaf-origen .oaf-col-title{color:var(--green)}
.oaf-origen .oaf-col-total{color:var(--green)}
.oaf-aplicacion .oaf-col-header{background:var(--red-bg);border-bottom-color:var(--red-border)}
.oaf-aplicacion .oaf-col-title{color:var(--red)}
.oaf-aplicacion .oaf-col-total{color:var(--red)}

.oaf-row{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:1px solid var(--border);transition:background .1s}
.oaf-row:last-child{border-bottom:none}
.oaf-row:hover{background:var(--surface2)}
.oaf-row-label{font-size:12px;color:var(--ink-dim);display:flex;align-items:center;gap:8px}
.oaf-row-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.oaf-row-val{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;color:var(--ink)}
.oaf-row-val.zero{color:var(--ink-faint);font-weight:400}
.oaf-row-pct{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-faint);margin-left:8px}

/* EMPTY */
.empty{text-align:center;padding:60px 24px;color:var(--ink-faint)}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-title{font-size:14px;font-weight:600;color:var(--ink-dim);margin-bottom:6px}
.empty-sub{font-size:12px;line-height:1.6}

/* ALERT */
.alert{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-radius:4px;font-size:12px;margin-bottom:18px}
.alert.warn{background:var(--amber-bg);border:1px solid #f0d090;color:var(--amber)}
</style>
<script>if(sessionStorage.getItem("lpcash_auth")!=="1"){window.location.href="/CashLP/login.html"}</script>
</head>
<body>

<nav>
  <div class="nav-left">
    <a class="nav-back" href="/CashLP/index.html">← LPCash</a>
    <span class="nav-sep">/</span>
    <span class="nav-title">Origen y Aplicación de Fondos</span>
  </div>
  <div class="nav-right" id="nav-right">OAF</div>
</nav>

<div class="layout">
  <div class="sidebar">
    <div class="sb-head">
      <div class="sb-head-label">OAF</div>
      <div class="sb-head-sub">Por mes</div>
    </div>
    <div class="sb-months" id="sb-months"></div>
    <div style="padding:12px 16px;border-top:1px solid var(--border)">
      <button id="btn-annual" onclick="showAnnual()" style="width:100%;padding:8px 10px;background:transparent;border:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-dim);cursor:pointer;border-radius:3px;transition:all .15s;text-align:left">📊 Resumen anual</button>
    </div>
  </div>

  <div class="main">
    <div class="main-inner" id="main-inner">
      <div class="empty">
        <div class="empty-icon">⚖️</div>
        <div class="empty-title">Selecciona un mes</div>
        <div class="empty-sub">El OAF se construye automáticamente<br>a partir de los extractos importados.</div>
      </div>
    </div>
  </div>
</div>

<script>
const K_MOVS = 'lp_movs_v3';
const MK = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
const MF = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

const loadMovs = () => { try { return JSON.parse(localStorage.getItem(K_MOVS)||'{}'); } catch { return {}; } };
const fmtE = n => new Intl.NumberFormat('es-ES',{minimumFractionDigits:0,maximumFractionDigits:0}).format(Math.round(Math.abs(n))) + '€';
const fmtP = (n,total) => total > 0 ? ((Math.abs(n)/total)*100).toFixed(1)+'%' : '—';

let currentKey = null;

// ── ORIGEN groups ──
const ORIGEN_GROUPS = [
  { id:'ventas',       label:'Ventas',                dot:'#1a6b3c', cats:['Entradas clientes'] },
  { id:'pigeons_in',   label:'PIGEONS (cobros)',       dot:'#c0392b', cats:['PIGEONS'], onlyPos:true },
  { id:'financiacion', label:'Financiación',           dot:'#2563c4', cats:['Financiación'] },
  { id:'otros_in',     label:'Otros ingresos',         dot:'#a8a8a2', cats:['Otros gastos','Sin categoría'], onlyPos:true },
];

// ── APLICACIÓN groups ──
const APLIC_GROUPS = [
  { id:'pigeons',      label:'PIGEONS',                dot:'#c0392b', cats:['PIGEONS'], onlyNeg:true },
  { id:'rrhh',         label:'RRHH',                   dot:'#a93226', cats:['Sueldos','Cotizaciones'] },
  { id:'estructura',   label:'Estructura',             dot:'#1a4a8a', cats:['Arrendamientos','Serv. profesionales','Seguros','Servicios bancarios','Publicidad','Suministros','IT y SaaS'] },
  { id:'dev_bsch',     label:'Devolución BSCH',        dot:'#9a5a00', cats:['Dev. deuda bancaria'], filter: c => c.toLowerCase().includes('0049 4769 103') || c.toLowerCase().includes('0610424') || c.toLowerCase().includes('0610645') },
  { id:'dev_bbva',     label:'Devolución BBVA',        dot:'#9a5a00', cats:['Dev. deuda bancaria'], filter: c => c.toLowerCase().includes('cargo por amortizacion de prestamo') },
  { id:'dev_sabadell', label:'Devolución SABADELL',    dot:'#9a5a00', cats:['Dev. deuda bancaria'], filter: c => c.toLowerCase().includes('confirming') },
  { id:'dev_bk',       label:'Devolución BANKINTER',   dot:'#9a5a00', cats:['Dev. deuda bancaria'], filter: c => c.toLowerCase().includes('anticipo') || c.toLowerCase().includes('510012903') },
  { id:'aplaz_imp',    label:'Aplazamiento Impuestos', dot:'#9a5a00', cats:['Otros impuestos','Dev. deuda bancaria'], filter: c => c.toLowerCase().includes('abonare') || c.toLowerCase().includes('aplazamiento') },
  { id:'irpf',         label:'Impuestos IRPF',         dot:'#b5620a', cats:['IRPF'] },
  { id:'iva',          label:'Impuestos IVA',          dot:'#b5620a', cats:['IVA'] },
  { id:'otros_imp',    label:'Otros Impuestos',        dot:'#b5620a', cats:['Otros impuestos'], filter: c => !c.toLowerCase().includes('abonare') },
  { id:'otros_sal',    label:'Otros gastos',           dot:'#a8a8a2', cats:['Otros gastos','Sin categoría'], onlyNeg:true },
];

// ── INIT ──
window.onload = () => {
  buildSidebar();
  // Auto-select current month
  const now = new Date();
  selectMonth(`${MK[now.getMonth()]}-${now.getFullYear()}`);
};

// ── SIDEBAR ──
function buildSidebar() {
  const movs = loadMovs();
  const year = new Date().getFullYear();
  let html = `<div class="sb-year">${year}</div>`;
  MK.forEach((m,i) => {
    const key   = `${m}-${year}`;
    const count = Object.keys(movs[key]||{}).length;
    html += `<div class="sb-month ${currentKey===key?'active':''} ${count?'has-data':''}" id="sbm-${key}" onclick="selectMonth('${key}')">
      ${MF[i].slice(0,3).toUpperCase()+MF[i].slice(3).toLowerCase()}
      <span class="sb-badge">${count||0}</span>
    </div>`;
  });
  document.getElementById('sb-months').innerHTML = html;
}

// ── SELECT MONTH ──
function selectMonth(key) {
  currentKey = key;
  document.querySelectorAll('.sb-month').forEach(el => el.classList.remove('active'));
  document.getElementById('sbm-'+key)?.classList.add('active');
  const btn = document.getElementById('btn-annual');
  if (btn) { btn.style.background='transparent'; btn.style.color='var(--ink-dim)'; }
  renderOAF(key);
}

// ── COMPUTE ──
function computeGroup(movs, group) {
  return movs
    .filter(m => {
      if (m.cat === 'Traspasos internos') return false; // excluir movimientos internos
      if (!group.cats.includes(m.cat)) return false;
      if (group.onlyPos  && m.importe <= 0) return false;
      if (group.onlyNeg  && m.importe >= 0) return false;
      if (group.filter   && !group.filter(m.concepto)) return false;
      return true;
    })
    .reduce((s,m) => s + Math.abs(m.importe), 0);
}

// ── RENDER ──
function renderOAF(key) {
  const [mon, year] = key.split('-');
  const monIdx = MK.indexOf(mon);
  const label  = MF[monIdx];
  const movs   = Object.values(loadMovs()[key] || {});

  document.getElementById('nav-right').textContent = `${mon} ${year}`;

  if (!movs.length) {
    document.getElementById('main-inner').innerHTML = `
      <div class="page-header">
        <div><div class="page-title">OAF — ${label} ${year}</div>
        <div class="page-sub">Sin movimientos importados para este mes</div></div>
      </div>
      <div class="empty">
        <div class="empty-icon">📂</div>
        <div class="empty-title">Sin datos para ${label}</div>
        <div class="empty-sub">Importa los extractos bancarios de ${label}<br>para generar el OAF automáticamente.</div>
      </div>`;
    return;
  }

  // Compute all groups
  const origenData = ORIGEN_GROUPS.map(g => ({ ...g, val: computeGroup(movs, g) }));
  const aplicData  = APLIC_GROUPS.map(g => ({ ...g, val: computeGroup(movs, g) }));

  // Real totals — excluir traspasos internos (movimientos entre cuentas propias)
  const operativos = movs.filter(m => m.cat !== 'Traspasos internos');
  const realOrigen = operativos.filter(m=>m.importe>0).reduce((s,m)=>s+m.importe,0);
  const realAplic  = Math.abs(operativos.filter(m=>m.importe<0).reduce((s,m)=>s+m.importe,0));
  const saldo      = realOrigen - realAplic;

  // Handle deuda devolution remainder
  const totalDevBancos = aplicData.filter(g=>g.id.startsWith('dev_')).reduce((s,g)=>s+g.val,0);
  const totalDevCat    = Math.abs(movs.filter(m=>m.cat==='Dev. deuda bancaria').reduce((s,m)=>s+m.importe,0));
  const devRemainder   = Math.max(totalDevCat - totalDevBancos, 0);

  // Unmapped: difference between real total and what groups captured
  const groupsOrigenTotal = origenData.reduce((s,g)=>s+g.val,0);
  const groupsAplicTotal  = aplicData.reduce((s,g)=>s+g.val,0) + devRemainder;
  const unmappedOrigen    = Math.max(realOrigen - groupsOrigenTotal, 0);
  const unmappedAplic     = Math.max(realAplic  - groupsAplicTotal,  0);

  const warnHtml = (unmappedOrigen > 1 || unmappedAplic > 1)
    ? `<div class="alert warn">⚠ ${fmtE(unmappedOrigen + unmappedAplic)} en movimientos sin mapear — aparecen como "No mapeado" para que el OAF cuadre con el extracto.</div>`
    : '';

  const renderRows = (groups, total, extra=[]) => {
    let rows = groups
      .filter(g => g.val > 0)
      .map(g => `
        <div class="oaf-row">
          <span class="oaf-row-label">
            <div class="oaf-row-dot" style="background:${g.dot}"></div>
            ${g.label}
          </span>
          <span>
            <span class="oaf-row-val">${fmtE(g.val)}</span>
            <span class="oaf-row-pct">${fmtP(g.val, total)}</span>
          </span>
        </div>`).join('');
    extra.forEach(e => {
      if (e.val <= 0) return;
      rows += `<div class="oaf-row">
        <span class="oaf-row-label">
          <div class="oaf-row-dot" style="background:#9a5a00"></div>
          ${e.label}
        </span>
        <span>
          <span class="oaf-row-val">${fmtE(e.val)}</span>
          <span class="oaf-row-pct">${fmtP(e.val, total)}</span>
        </span>
      </div>`;
    });
    if (!rows) rows = `<div class="oaf-row"><span class="oaf-row-label" style="color:var(--ink-faint);font-style:italic">Sin movimientos categorizados</span></div>`;
    return rows;
  };

  const extraAplic = [
    ...(devRemainder > 0 ? [{label:'Dev. deuda (otros)', val: devRemainder, dot:'#9a5a00'}] : []),
    ...(unmappedAplic > 1 ? [{label:'No mapeado', val: unmappedAplic, dot:'#a8a8a2'}] : []),
  ];
  const extraOrigen = unmappedOrigen > 1 ? [{label:'No mapeado', val: unmappedOrigen, dot:'#a8a8a2'}] : [];

  document.getElementById('main-inner').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">OAF — ${label} ${year}</div>
        <div class="page-sub">${movs.length} movimientos · generado automáticamente de extractos</div>
      </div>
    </div>

    ${warnHtml}

    <!-- SUMMARY -->
    <div class="summary-bar">
      <div class="sum-item">
        <div class="sum-label">Origen (entradas)</div>
        <div class="sum-val" style="color:var(--green)">${fmtE(realOrigen)}</div>
        <div class="sum-sub">${movs.filter(m=>m.importe>0).length} movimientos de entrada</div>
      </div>
      <div class="sum-item">
        <div class="sum-label">Aplicación (salidas)</div>
        <div class="sum-val" style="color:var(--red)">${fmtE(realAplic)}</div>
        <div class="sum-sub">${movs.filter(m=>m.importe<0).length} movimientos de salida</div>
      </div>
      <div class="sum-item">
        <div class="sum-label">Saldo neto</div>
        <div class="sum-val" style="color:${saldo>=0?'var(--green)':'var(--red)'}">${saldo>=0?'+':''}${fmtE(saldo)}</div>
        <div class="sum-sub">${saldo>=0?'Positivo · más entradas que salidas':'Negativo · más salidas que entradas'}</div>
      </div>
    </div>

    <!-- OAF TWO COLUMNS -->
    <div class="oaf-wrap">
      <div class="oaf-col oaf-origen">
        <div class="oaf-col-header">
          <span class="oaf-col-title">Origen</span>
          <span class="oaf-col-total">${fmtE(realOrigen)}</span>
        </div>
        ${renderRows(origenData, realOrigen, extraOrigen)}
      </div>
      <div class="oaf-col oaf-aplicacion">
        <div class="oaf-col-header">
          <span class="oaf-col-title">Aplicación</span>
          <span class="oaf-col-total">${fmtE(realAplic)}</span>
        </div>
        ${renderRows(aplicData, realAplic, extraAplic)}
      </div>
    </div>`;
}
// ── ANNUAL VIEW ──
function showAnnual() {
  currentKey = null;
  document.querySelectorAll('.sb-month').forEach(el => el.classList.remove('active'));
  document.getElementById('btn-annual').style.background = 'var(--ink)';
  document.getElementById('btn-annual').style.color = 'white';

  const movs = loadMovs();
  const year = new Date().getFullYear();

  document.getElementById('nav-right').textContent = `Anual ${year}`;

  // Aggregate all months
  let totalOrigen = 0, totalAplic = 0;
  const origenTotals = Object.fromEntries(ORIGEN_GROUPS.map(g => [g.id, 0]));
  const aplicTotals  = Object.fromEntries(APLIC_GROUPS.map(g => [g.id, 0]));
  let totalDevRemainder = 0;
  let totalMovs = 0, totalSinCat = 0, totalSinCatVal = 0;

  MK.forEach(m => {
    const key  = `${m}-${year}`;
    const mm   = Object.values(movs[key] || {});
    totalMovs += mm.length;

    ORIGEN_GROUPS.forEach(g => { origenTotals[g.id] += computeGroup(mm, g); });
    APLIC_GROUPS.forEach(g  => { aplicTotals[g.id]  += computeGroup(mm, g); });

    const totalDevCat     = Math.abs(mm.filter(m=>m.cat==='Dev. deuda bancaria').reduce((s,m)=>s+m.importe,0));
    const totalDevBancos  = APLIC_GROUPS.filter(g=>g.id.startsWith('dev_')).reduce((s,g) => s + computeGroup(mm, g), 0);
    totalDevRemainder    += Math.max(totalDevCat - totalDevBancos, 0);

    totalSinCat   += mm.filter(m=>m.cat==='Sin categoría').length;
    totalSinCatVal += Math.abs(mm.filter(m=>m.cat==='Sin categoría').reduce((s,m)=>s+m.importe,0));
  });

  totalOrigen = Object.values(origenTotals).reduce((s,v)=>s+v,0);
  totalAplic  = Object.values(aplicTotals).reduce((s,v)=>s+v,0) + totalDevRemainder;
  const saldo = totalOrigen - totalAplic;

  // Monthly breakdown table
  const monthRows = MK.map((m, i) => {
    const key  = `${m}-${year}`;
    const mm   = Object.values(movs[key] || {});
    if (!mm.length) return `<tr style="opacity:.35"><td>${MF[i]}</td><td colspan="4" style="text-align:center;color:var(--ink-faint);font-size:11px">Sin datos</td></tr>`;

    const origen = mm.filter(x=>x.importe>0).reduce((s,x)=>s+x.importe,0);
    const aplic  = Math.abs(mm.filter(x=>x.importe<0).reduce((s,x)=>s+x.importe,0));
    const saldo  = origen - aplic;
    const ventas = computeGroup(mm, ORIGEN_GROUPS.find(g=>g.id==='ventas'));
    const rrhh   = computeGroup(mm, APLIC_GROUPS.find(g=>g.id==='rrhh'));
    const sc     = saldo >= 0;

    return `<tr onclick="selectMonth('${key}')" style="cursor:pointer">
      <td style="font-weight:600">${MF[i].slice(0,3).toUpperCase()+MF[i].slice(3).toLowerCase()}</td>
      <td style="font-family:'IBM Plex Mono',monospace;color:var(--green)">${fmtE(origen)}</td>
      <td style="font-family:'IBM Plex Mono',monospace;color:var(--green);font-size:11px">${fmtE(ventas)}</td>
      <td style="font-family:'IBM Plex Mono',monospace;color:var(--red)">${fmtE(aplic)}</td>
      <td style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-dim)">${fmtE(rrhh)}</td>
      <td style="font-family:'IBM Plex Mono',monospace;color:${sc?'var(--green)':'var(--red)'};font-weight:600">${sc?'+':''}${fmtE(saldo)}</td>
    </tr>`;
  }).join('');

  const warnHtml = totalSinCat > 0
    ? `<div class="alert warn">⚠ ${totalSinCat} movimientos sin categorizar en el año por ${fmtE(totalSinCatVal)} — revísalos en Extractos.</div>`
    : '';

  const renderAnnualRows = (groups, totals, total, extra=[]) => {
    let rows = groups
      .filter(g => totals[g.id] > 0)
      .map(g => `
        <div class="oaf-row">
          <span class="oaf-row-label">
            <div class="oaf-row-dot" style="background:${g.dot}"></div>${g.label}
          </span>
          <span>
            <span class="oaf-row-val">${fmtE(totals[g.id])}</span>
            <span class="oaf-row-pct">${fmtP(totals[g.id], total)}</span>
          </span>
        </div>`).join('');
    extra.forEach(e => {
      if (e.val <= 0) return;
      rows += `<div class="oaf-row">
        <span class="oaf-row-label"><div class="oaf-row-dot" style="background:#9a5a00"></div>${e.label}</span>
        <span><span class="oaf-row-val">${fmtE(e.val)}</span><span class="oaf-row-pct">${fmtP(e.val,total)}</span></span>
      </div>`;
    });
    if (!rows) rows = `<div class="oaf-row"><span class="oaf-row-label" style="color:var(--ink-faint);font-style:italic">Sin movimientos</span></div>`;
    return rows;
  };

  const extraAplic = totalDevRemainder > 0 ? [{label:'Dev. deuda (otros)', val: totalDevRemainder}] : [];

  document.getElementById('main-inner').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">OAF Anual — ${year}</div>
        <div class="page-sub">${totalMovs} movimientos totales · click en un mes para ver el detalle</div>
      </div>
    </div>

    ${warnHtml}

    <div class="summary-bar">
      <div class="sum-item">
        <div class="sum-label">Origen anual</div>
        <div class="sum-val" style="color:var(--green)">${fmtE(totalOrigen)}</div>
        <div class="sum-sub">Total entradas ${year}</div>
      </div>
      <div class="sum-item">
        <div class="sum-label">Aplicación anual</div>
        <div class="sum-val" style="color:var(--red)">${fmtE(totalAplic)}</div>
        <div class="sum-sub">Total salidas ${year}</div>
      </div>
      <div class="sum-item">
        <div class="sum-label">Saldo neto anual</div>
        <div class="sum-val" style="color:${saldo>=0?'var(--green)':'var(--red)'}">${saldo>=0?'+':''}${fmtE(saldo)}</div>
        <div class="sum-sub">${saldo>=0?'Positivo':'Negativo'} en el año</div>
      </div>
    </div>

    <!-- OAF ANUAL por partida -->
    <div class="oaf-wrap" style="margin-bottom:20px">
      <div class="oaf-col oaf-origen">
        <div class="oaf-col-header">
          <span class="oaf-col-title">Origen total</span>
          <span class="oaf-col-total">${fmtE(totalOrigen)}</span>
        </div>
        ${renderAnnualRows(ORIGEN_GROUPS, origenTotals, totalOrigen)}
      </div>
      <div class="oaf-col oaf-aplicacion">
        <div class="oaf-col-header">
          <span class="oaf-col-title">Aplicación total</span>
          <span class="oaf-col-total">${fmtE(totalAplic)}</span>
        </div>
        ${renderAnnualRows(APLIC_GROUPS, aplicTotals, totalAplic, extraAplic)}
      </div>
    </div>

    <!-- MONTHLY BREAKDOWN -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden">
      <div style="padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;justify-content:space-between;align-items:center">
        <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint)">Desglose mensual</span>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-faint)">click para ver detalle</span>
      </div>
      <table style="width:100%;border-collapse:collapse">
        <thead>
          <tr style="background:var(--ink)">
            <th style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:rgba(255,255,255,.6);padding:8px 14px;text-align:left;font-weight:500">Mes</th>
            <th style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:rgba(255,255,255,.6);padding:8px 14px;text-align:right;font-weight:500">Origen</th>
            <th style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:rgba(255,255,255,.6);padding:8px 14px;text-align:right;font-weight:500">↳ Ventas</th>
            <th style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:rgba(255,255,255,.6);padding:8px 14px;text-align:right;font-weight:500">Aplicación</th>
            <th style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:rgba(255,255,255,.6);padding:8px 14px;text-align:right;font-weight:500">↳ RRHH</th>
            <th style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:rgba(255,255,255,.6);padding:8px 14px;text-align:right;font-weight:500">Saldo</th>
          </tr>
        </thead>
        <tbody style="font-size:12px">
          ${monthRows}
          <tr style="background:var(--surface2);border-top:2px solid var(--border-strong);font-weight:700">
            <td style="padding:9px 14px">TOTAL ${year}</td>
            <td style="font-family:'IBM Plex Mono',monospace;padding:9px 14px;text-align:right;color:var(--green)">${fmtE(totalOrigen)}</td>
            <td style="font-family:'IBM Plex Mono',monospace;padding:9px 14px;text-align:right;color:var(--green);font-size:11px">${fmtE(origenTotals['ventas'])}</td>
            <td style="font-family:'IBM Plex Mono',monospace;padding:9px 14px;text-align:right;color:var(--red)">${fmtE(totalAplic)}</td>
            <td style="font-family:'IBM Plex Mono',monospace;padding:9px 14px;text-align:right;font-size:11px">${fmtE(aplicTotals['rrhh'])}</td>
            <td style="font-family:'IBM Plex Mono',monospace;padding:9px 14px;text-align:right;color:${saldo>=0?'var(--green)':'var(--red)'}">${saldo>=0?'+':''}${fmtE(saldo)}</td>
          </tr>
        </tbody>
      </table>
    </div>`;
}
</script>
</body>
</html>
