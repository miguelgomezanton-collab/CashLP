<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — LPCash</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f7f5; --surface:#fff; --surface2:#f2f2ef; --surface3:#eaeae6;
  --border:#e0dfd9; --border-strong:#c8c7c0;
  --ink:#1a1a18; --ink-dim:#6b6b65; --ink-faint:#a8a8a2;
  --green:#1a6b3c; --green-bg:#eaf4ee; --green-border:#b8ddc6;
  --red:#c0392b; --red-bg:#fdf0ee; --red-border:#f5c0b8;
  --blue:#1a4a8a; --blue-bg:#eef3fc; --blue-border:#b8cef0;
  --amber:#9a5a00; --amber-bg:#fdf5e6; --amber-border:#f0d090;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;font-size:14px;min-height:100vh;display:flex;flex-direction:column}

nav{background:var(--ink);color:white;height:52px;padding:0 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0}
.nav-left{display:flex;align-items:center;gap:16px}
.nav-back{font-family:'IBM Plex Mono',monospace;font-size:11px;color:rgba(255,255,255,.45);text-decoration:none;transition:color .15s}
.nav-back:hover{color:rgba(255,255,255,.8)}
.nav-sep{color:rgba(255,255,255,.2)}
.nav-title{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;letter-spacing:.04em}
.nav-right{font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,.35);display:flex;align-items:center;gap:10px}
.nav-refresh{cursor:pointer;padding:4px 8px;border:1px solid rgba(255,255,255,.2);border-radius:3px;transition:all .15s;font-size:10px}
.nav-refresh:hover{border-color:rgba(255,255,255,.5);color:white}

.main{flex:1;overflow-y:auto;padding:28px 36px 60px;max-width:1100px;width:100%}

/* PAGE HEADER */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px}
.page-title{font-size:20px;font-weight:700}
.page-sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-faint);margin-top:5px}
.last-check{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-faint)}

/* HEALTH SCORE */
.health-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:24px}
.health-item{background:var(--surface);padding:14px 16px;text-align:center}
.health-icon{font-size:22px;margin-bottom:6px}
.health-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:4px}
.health-status{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600}
.ok{color:var(--green)}
.warn{color:var(--amber)}
.err{color:var(--red)}
.na{color:var(--ink-faint)}

/* SCORE CARD */
.score-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:20px 24px;margin-bottom:24px;display:flex;align-items:center;gap:24px}
.score-circle{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700;flex-shrink:0;border:3px solid}
.score-meta{flex:1}
.score-title{font-size:16px;font-weight:700;margin-bottom:4px}
.score-desc{font-size:12px;color:var(--ink-dim);line-height:1.5}
.score-breakdown{display:flex;gap:16px;margin-top:8px}
.score-pill{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 8px;border-radius:2px}

/* ALERTS GRID */
.alerts-section{margin-bottom:24px}
.section-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:10px;display:flex;align-items:center;gap:12px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.alerts-list{display:flex;flex-direction:column;gap:8px}

/* ALERT CARD */
.alert-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:14px 16px;display:flex;align-items:flex-start;gap:14px;transition:background .1s}
.alert-card:hover{background:var(--surface2)}
.alert-card.red{border-left:3px solid var(--red);background:var(--red-bg)}
.alert-card.amber{border-left:3px solid #f0a030;background:var(--amber-bg)}
.alert-card.green{border-left:3px solid var(--green);background:var(--green-bg)}
.alert-card.blue{border-left:3px solid var(--blue);background:var(--blue-bg)}
.alert-badge{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:1px}
.alert-badge.red{background:var(--red-bg);border:1px solid var(--red-border)}
.alert-badge.amber{background:var(--amber-bg);border:1px solid var(--amber-border)}
.alert-badge.green{background:var(--green-bg);border:1px solid var(--green-border)}
.alert-badge.blue{background:var(--blue-bg);border:1px solid var(--blue-border)}
.alert-body{flex:1}
.alert-title{font-size:13px;font-weight:600;margin-bottom:3px}
.alert-desc{font-size:12px;color:var(--ink-dim);line-height:1.5}
.alert-action{font-family:'IBM Plex Mono',monospace;font-size:10px;margin-top:6px;cursor:pointer;text-decoration:underline;text-underline-offset:2px}
.alert-action.red{color:var(--red)}
.alert-action.amber{color:var(--amber)}
.alert-action.blue{color:var(--blue)}
.alert-meta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-faint);flex-shrink:0;margin-top:2px}

/* KPI ROW */
.kpi-grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:24px}
.mini-kpi{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:12px 14px;border-left:3px solid var(--border)}
.mini-kpi-label{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:5px}
.mini-kpi-val{font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:600;line-height:1;color:var(--ink)}
.mini-kpi-sub{font-size:11px;color:var(--ink-dim);margin-top:3px}

/* EMPTY */
.all-ok{text-align:center;padding:40px 24px;background:var(--green-bg);border:1px solid var(--green-border);border-radius:4px}
.all-ok-icon{font-size:36px;margin-bottom:10px}
.all-ok-title{font-size:15px;font-weight:700;color:var(--green);margin-bottom:6px}
.all-ok-sub{font-size:12px;color:var(--green);opacity:.8}
</style>
<script type="module">
// ════════════════════════════════════════════════════════
// FIREBASE ADAPTER
// ════════════════════════════════════════════════════════
// ════════════════════════════════════════════════════════
// FIREBASE ADAPTER — sincroniza localStorage ↔ Firestore
// Incluir este bloque al inicio del <script> en cada HTML
// ════════════════════════════════════════════════════════

const _FB_CFG = {
  apiKey: "AIzaSyAB7JtnIUPpenmeSvmbXB3coLMcrv59Gsc",
  authDomain: "lpcash-2a547.firebaseapp.com",
  projectId: "lpcash-2a547",
  storageBucket: "lpcash-2a547.firebasestorage.app",
  messagingSenderId: "283983626636",
  appId: "1:283983626636:web:775a3d0df7e89f9b4696a9"
};

let _db = null;
let _fbReady = false;

async function _initFB() {
  if (_db) return _db;
  try {
    const { initializeApp, getApps } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const { getFirestore, doc, getDoc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const app = getApps().length ? getApps()[0] : initializeApp(_FB_CFG);
    _db = { fs: getFirestore(app), doc, getDoc, setDoc };
    _fbReady = true;
    return _db;
  } catch(e) {
    console.warn('Firebase no disponible, usando solo localStorage', e);
    return null;
  }
}

// Sincronizar al iniciar — descarga datos de Firestore a localStorage
async function fbSync() {
  const fb = await _initFB();
  if (!fb) return;
  const keys = ['lp_movs_v3','lp_imports_v3','lp_rules_v3','lp_ingresos_v1','lp_deuda_v1'];
  for (const k of keys) {
    try {
      const snap = await fb.getDoc(fb.doc(fb.fs, 'lpcash', k));
      if (snap.exists()) {
        const remoto = snap.data().value;
        const local  = localStorage.getItem(k);
        // Si remoto es más reciente (tiene más datos), lo usamos
        const remotoStr = JSON.stringify(remoto);
        if (remotoStr !== local) {
          localStorage.setItem(k, remotoStr);
        }
      }
    } catch(e) { console.warn('sync error', k, e); }
  }
}

// Guardar en localStorage + Firestore
async function fbSave(key, value) {
  const str = JSON.stringify(value);
  localStorage.setItem(key, str);
  const fb = await _initFB();
  if (!fb) return;
  try {
    await fb.setDoc(fb.doc(fb.fs, 'lpcash', key), { value });
  } catch(e) { console.warn('fbSave error', key, e); }
}

// Wrapper: reemplaza localStorage.setItem para las claves LP
const _origSet = localStorage.setItem.bind(localStorage);
const LP_KEYS = new Set(['lp_movs_v3','lp_imports_v3','lp_rules_v3','lp_ingresos_v1','lp_deuda_v1']);

localStorage.setItem = function(key, value) {
  _origSet(key, value);
  if (LP_KEYS.has(key)) {
    // Guardar en Firebase de forma asíncrona
    _initFB().then(fb => {
      if (!fb) return;
      try {
        const parsed = JSON.parse(value);
        fb.setDoc(fb.doc(fb.fs, 'lpcash', key), { value: parsed });
      } catch(e) { /* ignorar */ }
    });
  }
};

window.addEventListener('DOMContentLoaded', () => { fbSync(); });
</script>

<body>

<nav>
  <div class="nav-left">
    <a class="nav-back" href="/CashLP/index.html">← LPCash</a>
    <span class="nav-sep">/</span>
    <span class="nav-title">Dashboard de Salud</span>
  </div>
  <div class="nav-right">
    <span id="nav-date">—</span>
    <span class="nav-refresh" onclick="init()">↻ Actualizar</span>
  </div>
</nav>

<div class="main" id="main"></div>

<script>
const K_MOVS    = 'lp_movs_v3';
const K_IMPORTS = 'lp_imports_v3';
const K_PROJ    = 'lp_ingresos_v1';
const K_RULES   = 'lp_rules_v3';

const MK = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
const MF = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

const loadMovs    = () => { try { return JSON.parse(localStorage.getItem(K_MOVS)||'{}'); } catch { return {}; } };
const loadImports = () => { try { return JSON.parse(localStorage.getItem(K_IMPORTS)||'[]'); } catch { return []; } };
const loadProj    = () => { try { return JSON.parse(localStorage.getItem(K_PROJ)||'{}'); } catch { return {}; } };
const loadRules   = () => { try { return JSON.parse(localStorage.getItem(K_RULES)||'[]'); } catch { return []; } };

const fmtE = n => new Intl.NumberFormat('es-ES',{minimumFractionDigits:0}).format(Math.round(Math.abs(n)))+'€';
const signed = n => (n>=0?'+':'-')+fmtE(n);

// ── INIT ──
window.onload = init;

function init() {
  const now = new Date();
  document.getElementById('nav-date').textContent = now.toLocaleDateString('es-ES',{weekday:'short',day:'2-digit',month:'short'});
  document.getElementById('main').innerHTML = buildDashboard(now);
}

// ── BUILD DASHBOARD ──
function buildDashboard(now) {
  const m     = now.getMonth();
  const y     = now.getFullYear();
  const key   = `${MK[m]}-${y}`;
  const prevKey = m > 0 ? `${MK[m-1]}-${y}` : `${MK[11]}-${y-1}`;

  const movs    = loadMovs();
  const imports = loadImports();
  const proj    = loadProj();
  const rules   = loadRules();

  const mm       = Object.values(movs[key]    || {});
  const mmPrev   = Object.values(movs[prevKey]|| {});

  // ── CHECKS ──
  const checks = [];

  // 1. Extractos del mes actual
  const monthImps = imports.filter(i => i.month === key);
  const lastImp   = monthImps.length ? new Date(monthImps[monthImps.length-1].at) : null;
  const daysSince = lastImp ? Math.floor((now - lastImp) / 86400000) : 999;

  if (!mm.length) {
    checks.push({ level:'red', icon:'🏦', title:`Sin extractos importados en ${MF[m]}`, desc:'No hay movimientos del mes actual. Sube el extracto semanal para mantener el análisis actualizado.', action:'Subir extracto', link:'extractos.html', key:'no-extracto' });
  } else if (daysSince > 10) {
    checks.push({ level:'amber', icon:'🏦', title:`Extracto desactualizado — última subida hace ${daysSince} días`, desc:`El último extracto importado es del ${lastImp.toLocaleDateString('es-ES',{day:'2-digit',month:'long'})}. Te faltan movimientos recientes.`, action:'Subir extracto', link:'extractos.html', key:'extracto-antiguo' });
  } else {
    checks.push({ level:'green', icon:'🏦', title:`Extractos al día — ${mm.length} movimientos en ${MF[m]}`, desc:`Última importación hace ${daysSince === 0 ? 'hoy' : daysSince + ' días'}.`, key:'extracto-ok' });
  }

  // 2. Proyección del mes
  const p = proj[key];
  if (!p) {
    checks.push({ level:'amber', icon:'📈', title:`Sin proyección de ingresos para ${MF[m]}`, desc:'No has introducido la proyección de cobros de este mes. Sin ella no puedes comparar previsto vs real.', action:'Introducir proyección', link:'ingresos.html', key:'no-proj' });
  } else {
    const real = mm.filter(x=>x.cat==='Entradas clientes'&&x.importe>0).reduce((s,x)=>s+x.importe,0);
    const pct  = p.total > 0 ? real/p.total : 0;
    if (pct < 0.5 && real > 0) {
      checks.push({ level:'red', icon:'📈', title:`Cobros al ${(pct*100).toFixed(0)}% del previsto en ${MF[m]}`, desc:`Llevas ${fmtE(real)} cobrados de ${fmtE(p.total)} previstos. Quedan ${fmtE(p.total-real)} por cobrar.`, action:'Ver ingresos', link:'ingresos.html', key:'cobros-bajos' });
    } else if (pct < 0.75 && real > 0) {
      checks.push({ level:'amber', icon:'📈', title:`Cobros al ${(pct*100).toFixed(0)}% del previsto — pendiente ${fmtE(p.total-real)}`, desc:`Buen ritmo pero aún queda margen. Previsto: ${fmtE(p.total)}.`, action:'Ver ingresos', link:'ingresos.html', key:'cobros-med' });
    } else if (real > 0) {
      checks.push({ level:'green', icon:'📈', title:`Cobros al ${(pct*100).toFixed(0)}% del previsto ${pct>=1?'— ¡superado!':''}`, desc:`${fmtE(real)} cobrados de ${fmtE(p.total)} previstos.`, key:'cobros-ok' });
    }
  }

  // 3. Movimientos sin categorizar
  const sinCat = mm.filter(x => x.cat === 'Sin categoría');
  const sinCatVal = Math.abs(sinCat.reduce((s,x) => s+x.importe, 0));
  if (sinCat.length > 5) {
    checks.push({ level:'amber', icon:'🏷️', title:`${sinCat.length} movimientos sin categorizar (${fmtE(sinCatVal)})`, desc:'Los movimientos sin categoría distorsionan el OAF y la cuenta de tesorería. Revísalos en Extractos.', action:'Revisar extractos', link:'extractos.html', key:'sin-cat' });
  } else if (sinCat.length > 0) {
    checks.push({ level:'blue', icon:'🏷️', title:`${sinCat.length} movimiento${sinCat.length!==1?'s':''} sin categorizar`, desc:`Importe: ${fmtE(sinCatVal)}. Menor impacto pero conviene revisarlo.`, action:'Revisar extractos', link:'extractos.html', key:'sin-cat-low' });
  } else if (mm.length > 0) {
    checks.push({ level:'green', icon:'🏷️', title:'Todos los movimientos categorizados', desc:`${mm.length} movimientos con categoría asignada.`, key:'cat-ok' });
  }

  // 4. FC Tesorería del mes
  if (mm.length) {
    const explIn  = mm.filter(x=>x.cat==='Entradas clientes'&&x.importe>0).reduce((s,x)=>s+x.importe,0);
    const explOut = Math.abs(mm.filter(x=>['PIGEONS','Sueldos','Cotizaciones','Arrendamientos','Serv. profesionales','Seguros','Publicidad','Suministros','IT y SaaS','Servicios bancarios','IRPF','IVA','Otros impuestos'].includes(x.cat)&&x.importe<0).reduce((s,x)=>s+x.importe,0));
    const finIn   = mm.filter(x=>x.cat==='Financiación'&&x.importe>0).reduce((s,x)=>s+x.importe,0);
    const finOut  = Math.abs(mm.filter(x=>x.cat==='Dev. deuda bancaria'&&x.importe<0).reduce((s,x)=>s+x.importe,0));
    const fcExpl  = explIn - explOut;
    const fcTot   = fcExpl + (finIn - finOut);

    if (fcExpl < 0) {
      checks.push({ level:'red', icon:'💳', title:`FC Explotación negativo en ${MF[m]}: ${signed(fcExpl)}`, desc:'Las salidas de explotación superan las entradas de clientes. Revisa la tesorería.', action:'Ver tesorería', link:'tesoreria.html', key:'fc-neg' });
    } else if (fcTot < 0) {
      checks.push({ level:'amber', icon:'💳', title:`FC Total negativo en ${MF[m]}: ${signed(fcTot)}`, desc:`FC Explotación positivo (${signed(fcExpl)}) pero las devoluciones de deuda lo consumen.`, action:'Ver tesorería', link:'tesoreria.html', key:'fctot-neg' });
    } else {
      checks.push({ level:'green', icon:'💳', title:`FC Total positivo en ${MF[m]}: ${signed(fcTot)}`, desc:`Explotación: ${signed(fcExpl)} · Financiación: ${signed(finIn-finOut)}`, key:'fc-ok' });
    }
  }

  // 5. Proyecciones meses anteriores sin rellenar
  const missingProj = [];
  for (let i = 0; i < m; i++) {
    const k = `${MK[i]}-${y}`;
    if (!proj[k] && Object.keys(movs[k]||{}).length > 0) missingProj.push(MF[i]);
  }
  if (missingProj.length > 0) {
    checks.push({ level:'blue', icon:'📋', title:`Proyecciones pendientes: ${missingProj.join(', ')}`, desc:'Hay meses anteriores con extractos importados pero sin proyección. Sin ella el resumen anual no es completo.', action:'Introducir proyecciones', link:'ingresos.html', key:'proj-missing' });
  }

  // 6. Reglas aprendidas
  if (rules.length === 0 && mm.length > 0) {
    checks.push({ level:'blue', icon:'★', title:'Sin reglas de categorización aprendidas', desc:'Corrige categorías en el modal de importación para que el sistema aprenda y categorice automáticamente en el futuro.', action:'Ver extractos', link:'extractos.html', key:'no-rules' });
  }

  // ── SCORE ──
  const redCount   = checks.filter(c=>c.level==='red').length;
  const amberCount = checks.filter(c=>c.level==='amber').length;
  const greenCount = checks.filter(c=>c.level==='green').length;
  const totalChecks = checks.length;
  const score = Math.round(((greenCount + amberCount*0.5) / totalChecks) * 100);
  const scoreColor = score >= 80 ? 'var(--green)' : score >= 50 ? 'var(--amber)' : 'var(--red)';
  const scoreLabel = score >= 80 ? 'Buena salud financiera' : score >= 50 ? 'Atención requerida' : 'Situación crítica';
  const scoreDesc  = score >= 80 ? 'Los principales indicadores están en orden.' : score >= 50 ? 'Hay puntos que requieren tu atención esta semana.' : 'Hay alertas críticas que debes resolver hoy.';

  // ── KPIs RÁPIDOS ──
  const totalMovsYear = Object.values(movs).reduce((s,x)=>s+Object.keys(x||{}).length,0);
  const totalImps     = imports.length;
  const realMes       = mm.filter(x=>x.cat==='Entradas clientes'&&x.importe>0).reduce((s,x)=>s+x.importe,0);
  const saldoMes      = mm.filter(x=>x.importe>0).reduce((s,x)=>s+x.importe,0) - Math.abs(mm.filter(x=>x.importe<0).reduce((s,x)=>s+x.importe,0));
  const prevMes       = proj[key]?.total || 0;

  // ── RENDER ──
  const alertsByLevel = (level) => checks.filter(c=>c.level===level);
  const renderAlerts  = (list) => list.map(a => `
    <div class="alert-card ${a.level}">
      <div class="alert-badge ${a.level}">${a.icon}</div>
      <div class="alert-body">
        <div class="alert-title">${a.title}</div>
        <div class="alert-desc">${a.desc}</div>
        ${a.action ? `<div class="alert-action ${a.level}" onclick="location.href='${a.link}'">${a.action} →</div>` : ''}
      </div>
    </div>`).join('');

  const reds   = alertsByLevel('red');
  const ambers = alertsByLevel('amber');
  const blues  = alertsByLevel('blue');
  const greens = alertsByLevel('green');

  return `
    <div class="page-header">
      <div>
        <div class="page-title">Dashboard de Salud</div>
        <div class="page-sub">${MF[m]} ${y} · actualizado ${now.toLocaleDateString('es-ES',{day:'2-digit',month:'long',hour:'2-digit',minute:'2-digit'})}</div>
      </div>
    </div>

    <!-- SCORE -->
    <div class="score-card">
      <div class="score-circle" style="color:${scoreColor};border-color:${scoreColor}">${score}</div>
      <div class="score-meta">
        <div class="score-title">${scoreLabel}</div>
        <div class="score-desc">${scoreDesc}</div>
        <div class="score-breakdown">
          ${redCount   > 0 ? `<span class="score-pill" style="background:var(--red-bg);color:var(--red)">🔴 ${redCount} crítico${redCount!==1?'s':''}</span>` : ''}
          ${amberCount > 0 ? `<span class="score-pill" style="background:var(--amber-bg);color:var(--amber)">🟡 ${amberCount} aviso${amberCount!==1?'s':''}</span>` : ''}
          ${blues.length > 0 ? `<span class="score-pill" style="background:var(--blue-bg);color:var(--blue)">🔵 ${blues.length} info</span>` : ''}
          ${greenCount > 0 ? `<span class="score-pill" style="background:var(--green-bg);color:var(--green)">✓ ${greenCount} ok</span>` : ''}
        </div>
      </div>
    </div>

    <!-- HEALTH BAR -->
    <div class="health-bar">
      <div class="health-item">
        <div class="health-icon">🏦</div>
        <div class="health-label">Extractos</div>
        <div class="health-status ${!mm.length?'err':daysSince>10?'warn':'ok'}">${!mm.length?'Sin datos':daysSince>10?'Desactualizado':'Al día'}</div>
      </div>
      <div class="health-item">
        <div class="health-icon">📈</div>
        <div class="health-label">Proyección</div>
        <div class="health-status ${!p?'warn':'ok'}">${!p?'Pendiente':'Guardada'}</div>
      </div>
      <div class="health-item">
        <div class="health-icon">🏷️</div>
        <div class="health-label">Categorías</div>
        <div class="health-status ${sinCat.length>5?'warn':sinCat.length>0?'warn':'ok'}">${sinCat.length>0?sinCat.length+' sin cat.':'Completo'}</div>
      </div>
      <div class="health-item">
        <div class="health-icon">💳</div>
        <div class="health-label">FC Tesorería</div>
        <div class="health-status ${!mm.length?'na':checks.find(c=>c.key==='fc-neg')?'err':checks.find(c=>c.key==='fctot-neg')?'warn':'ok'}">${!mm.length?'—':checks.find(c=>c.key==='fc-neg')?'Negativo':checks.find(c=>c.key==='fctot-neg')?'Ajustado':'Positivo'}</div>
      </div>
      <div class="health-item">
        <div class="health-icon">★</div>
        <div class="health-label">Reglas</div>
        <div class="health-status ${rules.length===0?'na':'ok'}">${rules.length===0?'Sin reglas':rules.length+' aprendidas'}</div>
      </div>
    </div>

    <!-- KPIs RÁPIDOS -->
    <div class="kpi-grid-5">
      <div class="mini-kpi" style="border-left-color:var(--blue)">
        <div class="mini-kpi-label">Movimientos año</div>
        <div class="mini-kpi-val">${totalMovsYear||'—'}</div>
        <div class="mini-kpi-sub">${totalImps} importaciones</div>
      </div>
      <div class="mini-kpi" style="border-left-color:var(--green)">
        <div class="mini-kpi-label">Cobros ${MF[m].slice(0,3)}</div>
        <div class="mini-kpi-val" style="color:${realMes>0?'var(--green)':'var(--ink-faint)'}">${realMes>0?fmtE(realMes):'—'}</div>
        <div class="mini-kpi-sub">${prevMes?'de '+fmtE(prevMes)+' prev.':'sin proyección'}</div>
      </div>
      <div class="mini-kpi" style="border-left-color:${saldoMes>=0?'var(--green)':'var(--red)'}">
        <div class="mini-kpi-label">Saldo neto ${MF[m].slice(0,3)}</div>
        <div class="mini-kpi-val" style="color:${saldoMes>=0?'var(--green)':'var(--red)'}">${mm.length?signed(saldoMes):'—'}</div>
        <div class="mini-kpi-sub">entradas − salidas</div>
      </div>
      <div class="mini-kpi" style="border-left-color:var(--amber)">
        <div class="mini-kpi-label">Sin categorizar</div>
        <div class="mini-kpi-val" style="color:${sinCat.length>0?'var(--amber)':'var(--green)'}">${sinCat.length||'✓'}</div>
        <div class="mini-kpi-sub">${sinCat.length>0?fmtE(sinCatVal):'todos ok'}</div>
      </div>
      <div class="mini-kpi" style="border-left-color:var(--blue)">
        <div class="mini-kpi-label">Reglas aprendidas</div>
        <div class="mini-kpi-val">${rules.length||'—'}</div>
        <div class="mini-kpi-sub">reglas guardadas</div>
      </div>
    </div>

    <!-- ALERTAS POR NIVEL -->
    ${reds.length > 0 ? `
    <div class="alerts-section">
      <div class="section-label">🔴 Crítico — requiere acción inmediata</div>
      <div class="alerts-list">${renderAlerts(reds)}</div>
    </div>` : ''}

    ${ambers.length > 0 ? `
    <div class="alerts-section">
      <div class="section-label">🟡 Avisos — esta semana</div>
      <div class="alerts-list">${renderAlerts(ambers)}</div>
    </div>` : ''}

    ${blues.length > 0 ? `
    <div class="alerts-section">
      <div class="section-label">🔵 Información — pendiente revisar</div>
      <div class="alerts-list">${renderAlerts(blues)}</div>
    </div>` : ''}

    ${greens.length > 0 ? `
    <div class="alerts-section">
      <div class="section-label">✓ Todo en orden</div>
      <div class="alerts-list">${renderAlerts(greens)}</div>
    </div>` : ''}

    ${reds.length === 0 && ambers.length === 0 ? `
    <div class="all-ok">
      <div class="all-ok-icon">✅</div>
      <div class="all-ok-title">Todo en orden</div>
      <div class="all-ok-sub">No hay alertas críticas ni avisos pendientes.</div>
    </div>` : ''}`;
}
</script>
</body>
</html>
