<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesorería — LPCash</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f7f5; --surface:#fff; --surface2:#f2f2ef; --surface3:#eaeae6;
  --border:#e0dfd9; --border-strong:#c8c7c0;
  --ink:#1a1a18; --ink-dim:#6b6b65; --ink-faint:#a8a8a2;
  --green:#1a6b3c; --green-bg:#eaf4ee; --green-border:#b8ddc6;
  --red:#c0392b; --red-bg:#fdf0ee; --red-border:#f5c0b8;
  --blue:#1a4a8a; --blue-bg:#eef3fc; --blue-border:#b8cef0;
  --amber:#9a5a00; --amber-bg:#fdf5e6; --amber-border:#f0d090;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;font-size:14px;min-height:100vh;display:flex;flex-direction:column}

nav{background:var(--ink);color:white;height:52px;padding:0 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0}
.nav-left{display:flex;align-items:center;gap:16px}
.nav-back{font-family:'IBM Plex Mono',monospace;font-size:11px;color:rgba(255,255,255,.45);text-decoration:none;transition:color .15s}
.nav-back:hover{color:rgba(255,255,255,.8)}
.nav-sep{color:rgba(255,255,255,.2)}
.nav-title{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;letter-spacing:.04em}
.nav-right{font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,.35)}

.layout{display:flex;flex:1;min-height:0}

/* SIDEBAR */
.sidebar{width:196px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-head{padding:16px 16px 12px;border-bottom:1px solid var(--border)}
.sb-head-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:2px}
.sb-head-sub{font-size:11px;color:var(--ink-dim)}
.sb-months{flex:1;overflow-y:auto;padding:8px 0}
.sb-year{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);padding:10px 16px 4px}
.sb-month{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;cursor:pointer;font-size:12px;color:var(--ink-dim);border-left:2px solid transparent;transition:background .1s}
.sb-month:hover{background:var(--surface2);color:var(--ink)}
.sb-month.active{background:var(--blue-bg);color:var(--blue);border-left-color:var(--blue);font-weight:600}
.sb-month.has-data{color:var(--ink)}
.sb-badge{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:1px 6px;border-radius:10px;background:var(--surface3);color:var(--ink-faint)}
.sb-month.active .sb-badge{background:var(--blue);color:white}
.sb-month.has-data .sb-badge{background:var(--green-bg);color:var(--green)}
.sb-bottom{padding:12px 16px;border-top:1px solid var(--border)}
.sb-btn{width:100%;padding:8px 10px;background:transparent;border:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-dim);cursor:pointer;border-radius:3px;transition:all .15s;text-align:left}
.sb-btn:hover{border-color:var(--ink);color:var(--ink)}
.sb-btn.active{background:var(--ink);color:white;border-color:var(--ink)}

/* MAIN */
.main{flex:1;overflow-y:auto}
.main-inner{max-width:900px;padding:24px 28px 60px}

.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:20px;font-weight:700}
.page-sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-faint);margin-top:5px}

/* SUMMARY CARDS */
.summary-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:22px}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:16px 18px;border-left:3px solid var(--border)}
.sum-card-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:6px}
.sum-card-val{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;line-height:1}
.sum-card-sub{font-size:11px;color:var(--ink-dim);margin-top:4px}

/* CASH FLOW STATEMENT */
.cf-section{background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:14px}
.cf-section-header{padding:11px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.cf-section-title{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:.05em;display:flex;align-items:center;gap:8px}
.cf-section-total{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:700}
.cf-section.explotacion .cf-section-header{background:#eef3fc}
.cf-section.explotacion .cf-section-title{color:var(--blue)}
.cf-section.financiacion .cf-section-header{background:var(--amber-bg)}
.cf-section.financiacion .cf-section-title{color:var(--amber)}
.cf-section.total-section .cf-section-header{background:var(--ink);border-bottom:none}
.cf-section.total-section .cf-section-title{color:white;font-size:12px}
.cf-section.total-section .cf-section-total{color:white;font-size:17px}

/* ROWS */
.cf-row{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:1px solid var(--border)}
.cf-row:last-child{border-bottom:none}
.cf-row:hover{background:var(--surface2)}
.cf-row.subtotal{background:var(--surface2);border-top:1px solid var(--border-strong)}
.cf-row.subtotal .cf-row-label{font-weight:700;color:var(--ink)}
.cf-row.indent .cf-row-label{padding-left:16px;color:var(--ink-dim)}
.cf-row-label{font-size:12px;color:var(--ink-dim);display:flex;align-items:center;gap:8px}
.cf-row-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.cf-row-right{display:flex;align-items:center;gap:10px}
.cf-row-val{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500}
.cf-row-sign{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-faint);width:14px;text-align:center}
.cf-row-pct{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-faint);min-width:40px;text-align:right}

/* ANNUAL TABLE */
.annual-wrap{background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-top:20px}
.annual-tbl{width:100%;border-collapse:collapse}
.annual-tbl thead tr{background:var(--ink)}
.annual-tbl th{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.06em;color:rgba(255,255,255,.6);padding:9px 12px;text-align:right;font-weight:500}
.annual-tbl th:first-child{text-align:left}
.annual-tbl tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.annual-tbl tbody tr:hover{background:var(--surface2)}
.annual-tbl tbody tr.total-row{background:var(--surface2);border-top:2px solid var(--border-strong);font-weight:700;cursor:default}
.annual-tbl td{padding:8px 12px;font-size:12px;text-align:right;font-family:'IBM Plex Mono',monospace}
.annual-tbl td:first-child{text-align:left;font-family:'IBM Plex Sans',sans-serif;font-weight:600}
.pos{color:var(--green)}
.neg{color:var(--red)}
.zero{color:var(--ink-faint)}

/* EMPTY */
.empty{text-align:center;padding:60px 24px;color:var(--ink-faint)}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-title{font-size:14px;font-weight:600;color:var(--ink-dim);margin-bottom:6px}
.empty-sub{font-size:12px;line-height:1.6}
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <a class="nav-back" href="/CashLP/index.html">← LPCash</a>
    <span class="nav-sep">/</span>
    <span class="nav-title">Cuenta de Tesorería</span>
  </div>
  <div class="nav-right" id="nav-right">FCT</div>
</nav>

<div class="layout">
  <div class="sidebar">
    <div class="sb-head">
      <div class="sb-head-label">Tesorería</div>
      <div class="sb-head-sub">Flujos de caja</div>
    </div>
    <div class="sb-months" id="sb-months"></div>
    <div class="sb-bottom">
      <button class="sb-btn" id="btn-annual" onclick="showAnnual()">📊 Resumen anual</button>
    </div>
  </div>

  <div class="main">
    <div class="main-inner" id="main-inner">
      <div class="empty">
        <div class="empty-icon">💳</div>
        <div class="empty-title">Selecciona un mes</div>
        <div class="empty-sub">La cuenta de tesorería se genera<br>automáticamente de los extractos importados.</div>
      </div>
    </div>
  </div>
</div>

<script>
const K_MOVS = 'lp_movs_v3';
const MK = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
const MF = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

const loadMovs = () => { try { return JSON.parse(localStorage.getItem(K_MOVS)||'{}'); } catch { return {}; } };
const fmtE = n => new Intl.NumberFormat('es-ES',{minimumFractionDigits:0,maximumFractionDigits:0}).format(Math.round(Math.abs(n))) + '€';
const signed = (n, showPlus=true) => (n>=0&&showPlus?'+':'') + (n<0?'-':'') + fmtE(n);
const pctOf = (n, total) => total > 0 ? ((Math.abs(n)/total)*100).toFixed(1)+'%' : '—';

let currentKey = null;
let viewMode = 'month';

// ── DEFINICIÓN DEL CASH FLOW ──
const EXPLOT_IN = [
  { id:'ventas',   label:'Cobros de clientes',  dot:'#1a6b3c', cats:['Entradas clientes'] },
];

const EXPLOT_OUT = [
  { id:'pigeons',    label:'PIGEONS',               dot:'#c0392b', cats:['PIGEONS'],      onlyNeg:true },
  { id:'rrhh',       label:'RRHH',                  dot:'#a93226', cats:['Sueldos','Cotizaciones'] },
  { id:'estructura', label:'Estructura',            dot:'#1a4a8a', cats:['Arrendamientos','Serv. profesionales','Seguros','Publicidad','Suministros','IT y SaaS'] },
  { id:'sv_banc',    label:'Servicios bancarios',   dot:'#6b6b65', cats:['Servicios bancarios'] },
  { id:'irpf',       label:'IRPF / Retenciones',    dot:'#b5620a', cats:['IRPF'] },
  { id:'iva',        label:'IVA',                   dot:'#b5620a', cats:['IVA'] },
  { id:'otros_imp',  label:'Otros impuestos',       dot:'#b5620a', cats:['Otros impuestos'] },
];

const FINANC_IN = [
  { id:'financ',   label:'Disposiciones de deuda', dot:'#2563c4', cats:['Financiación'] },
];

const FINANC_OUT = [
  { id:'dev_deuda', label:'Amortización de deuda',  dot:'#9a5a00', cats:['Dev. deuda bancaria'] },
];

// ── COMPUTE ──
function computeGroup(movs, group) {
  return movs.filter(m => {
    if (!group.cats.includes(m.cat)) return false;
    if (group.onlyNeg && m.importe >= 0) return false;
    if (group.onlyPos && m.importe <= 0) return false;
    return true;
  }).reduce((s,m) => s + Math.abs(m.importe), 0);
}

function computeCF(movs) {
  const explIn  = EXPLOT_IN.map(g  => ({ ...g, val: computeGroup(movs, g) }));
  const explOut = EXPLOT_OUT.map(g => ({ ...g, val: computeGroup(movs, g) }));
  const finIn   = FINANC_IN.map(g  => ({ ...g, val: computeGroup(movs, g) }));
  const finOut  = FINANC_OUT.map(g => ({ ...g, val: computeGroup(movs, g) }));

  const totalExplIn  = explIn.reduce((s,g)  => s+g.val, 0);
  const totalExplOut = explOut.reduce((s,g) => s+g.val, 0);
  const fcExplot     = totalExplIn - totalExplOut;

  const totalFinIn   = finIn.reduce((s,g)  => s+g.val, 0);
  const totalFinOut  = finOut.reduce((s,g) => s+g.val, 0);
  const fcFinanc     = totalFinIn - totalFinOut;

  const fcTotal = fcExplot + fcFinanc;

  return { explIn, explOut, finIn, finOut, totalExplIn, totalExplOut, fcExplot, totalFinIn, totalFinOut, fcFinanc, fcTotal };
}

// ── INIT ──
window.onload = () => {
  buildSidebar();
  const now = new Date();
  selectMonth(`${MK[now.getMonth()]}-${now.getFullYear()}`);
};

// ── SIDEBAR ──
function buildSidebar() {
  const movs = loadMovs();
  const year = new Date().getFullYear();
  let html = `<div class="sb-year">${year}</div>`;
  MK.forEach((m, i) => {
    const key   = `${m}-${year}`;
    const count = Object.keys(movs[key]||{}).length;
    html += `<div class="sb-month ${currentKey===key?'active':''} ${count?'has-data':''}" id="sbm-${key}" onclick="selectMonth('${key}')">
      ${MF[i].slice(0,3).toUpperCase()+MF[i].slice(3).toLowerCase()}
      <span class="sb-badge">${count||0}</span>
    </div>`;
  });
  document.getElementById('sb-months').innerHTML = html;
}

// ── SELECT MONTH ──
function selectMonth(key) {
  currentKey = key;
  viewMode   = 'month';
  document.querySelectorAll('.sb-month').forEach(el => el.classList.remove('active'));
  document.getElementById('sbm-'+key)?.classList.add('active');
  document.getElementById('btn-annual').classList.remove('active');
  renderMonth(key);
}

// ── RENDER MONTH ──
function renderMonth(key) {
  const [mon, year] = key.split('-');
  const monIdx = MK.indexOf(mon);
  const label  = MF[monIdx];
  const movs   = Object.values(loadMovs()[key] || {});

  document.getElementById('nav-right').textContent = `${mon} ${year}`;

  if (!movs.length) {
    document.getElementById('main-inner').innerHTML = `
      <div class="page-header"><div>
        <div class="page-title">Tesorería — ${label} ${year}</div>
        <div class="page-sub">Sin movimientos importados para este mes</div>
      </div></div>
      <div class="empty">
        <div class="empty-icon">📂</div>
        <div class="empty-title">Sin datos para ${label}</div>
        <div class="empty-sub">Importa los extractos de ${label} para generar el flujo de caja.</div>
      </div>`;
    return;
  }

  const cf = computeCF(movs);
  document.getElementById('main-inner').innerHTML = buildCFHTML(label, year, cf, movs.length);
}

// ── BUILD HTML ──
function buildCFHTML(label, year, cf, nMovs) {
  const colorFC = n => n > 0 ? 'var(--green)' : n < 0 ? 'var(--red)' : 'var(--ink-faint)';
  const totalRef = cf.totalExplIn || 1;

  const inRows = (groups, ref) => groups.filter(g=>g.val>0).map(g => `
    <div class="cf-row indent">
      <span class="cf-row-label"><div class="cf-row-dot" style="background:${g.dot}"></div>${g.label}</span>
      <div class="cf-row-right">
        <span class="cf-row-sign" style="color:var(--green)">+</span>
        <span class="cf-row-val pos">${fmtE(g.val)}</span>
        <span class="cf-row-pct">${pctOf(g.val, ref)}</span>
      </div>
    </div>`).join('');

  const outRows = (groups, ref) => groups.filter(g=>g.val>0).map(g => `
    <div class="cf-row indent">
      <span class="cf-row-label"><div class="cf-row-dot" style="background:${g.dot}"></div>${g.label}</span>
      <div class="cf-row-right">
        <span class="cf-row-sign" style="color:var(--red)">−</span>
        <span class="cf-row-val neg">${fmtE(g.val)}</span>
        <span class="cf-row-pct">${pctOf(g.val, ref)}</span>
      </div>
    </div>`).join('');

  return `
    <div class="page-header">
      <div>
        <div class="page-title">Tesorería — ${label} ${year}</div>
        <div class="page-sub">${nMovs} movimientos · cuenta de tesorería por flujos</div>
      </div>
    </div>

    <!-- SUMMARY CARDS -->
    <div class="summary-row">
      <div class="sum-card" style="border-left-color:${colorFC(cf.fcExplot)}">
        <div class="sum-card-label">FC Explotación</div>
        <div class="sum-card-val" style="color:${colorFC(cf.fcExplot)}">${signed(cf.fcExplot)}</div>
        <div class="sum-card-sub">${fmtE(cf.totalExplIn)} cobros · ${fmtE(cf.totalExplOut)} pagos</div>
      </div>
      <div class="sum-card" style="border-left-color:${colorFC(cf.fcFinanc)}">
        <div class="sum-card-label">FC Financiación</div>
        <div class="sum-card-val" style="color:${colorFC(cf.fcFinanc)}">${signed(cf.fcFinanc)}</div>
        <div class="sum-card-sub">${fmtE(cf.totalFinIn)} entradas · ${fmtE(cf.totalFinOut)} devoluc.</div>
      </div>
      <div class="sum-card" style="border-left-color:${colorFC(cf.fcTotal)};${cf.fcTotal>=0?'background:var(--green-bg)':'background:var(--red-bg)'}">
        <div class="sum-card-label">Flujo Caja Total</div>
        <div class="sum-card-val" style="color:${colorFC(cf.fcTotal)};font-size:26px">${signed(cf.fcTotal)}</div>
        <div class="sum-card-sub">${cf.fcTotal>=0?'Generación positiva de caja':'Consumo neto de caja'}</div>
      </div>
    </div>

    <!-- BLOQUE EXPLOTACIÓN -->
    <div class="cf-section explotacion">
      <div class="cf-section-header">
        <span class="cf-section-title">🔵 Flujos de caja de explotación</span>
        <span class="cf-section-total" style="color:${colorFC(cf.fcExplot)}">${signed(cf.fcExplot)}</span>
      </div>

      <!-- Entradas -->
      <div class="cf-row" style="background:var(--green-bg);opacity:.85">
        <span class="cf-row-label" style="font-weight:600;color:var(--green)">Entradas de explotación</span>
        <span class="cf-row-val pos" style="font-weight:700">${fmtE(cf.totalExplIn)}</span>
      </div>
      ${inRows(cf.explIn, cf.totalExplIn)}

      <!-- Salidas -->
      <div class="cf-row" style="background:var(--red-bg);opacity:.85">
        <span class="cf-row-label" style="font-weight:600;color:var(--red)">Salidas de explotación</span>
        <span class="cf-row-val neg" style="font-weight:700">${fmtE(cf.totalExplOut)}</span>
      </div>
      ${outRows(cf.explOut, cf.totalExplIn)}

      <!-- Subtotal -->
      <div class="cf-row subtotal">
        <span class="cf-row-label">= Flujo de Caja de Explotación</span>
        <div class="cf-row-right">
          <span class="cf-row-val" style="color:${colorFC(cf.fcExplot)};font-size:14px;font-weight:700">${signed(cf.fcExplot)}</span>
        </div>
      </div>
    </div>

    <!-- BLOQUE FINANCIACIÓN -->
    <div class="cf-section financiacion">
      <div class="cf-section-header">
        <span class="cf-section-title">🟡 Flujos de caja de financiación</span>
        <span class="cf-section-total" style="color:${colorFC(cf.fcFinanc)}">${signed(cf.fcFinanc)}</span>
      </div>

      <!-- Entradas financiación -->
      <div class="cf-row" style="background:var(--green-bg);opacity:.85">
        <span class="cf-row-label" style="font-weight:600;color:var(--green)">Entrada de financiación</span>
        <span class="cf-row-val pos" style="font-weight:700">${fmtE(cf.totalFinIn)}</span>
      </div>
      ${inRows(cf.finIn, cf.totalFinIn || 1)}

      <!-- Salidas financiación -->
      <div class="cf-row" style="background:var(--red-bg);opacity:.85">
        <span class="cf-row-label" style="font-weight:600;color:var(--red)">Devolución de deuda</span>
        <span class="cf-row-val neg" style="font-weight:700">${fmtE(cf.totalFinOut)}</span>
      </div>
      ${outRows(cf.finOut, cf.totalFinIn || 1)}

      <!-- Subtotal -->
      <div class="cf-row subtotal">
        <span class="cf-row-label">= Flujo de Caja de Financiación</span>
        <div class="cf-row-right">
          <span class="cf-row-val" style="color:${colorFC(cf.fcFinanc)};font-size:14px;font-weight:700">${signed(cf.fcFinanc)}</span>
        </div>
      </div>
    </div>

    <!-- TOTAL TESORERÍA -->
    <div class="cf-section total-section">
      <div class="cf-section-header">
        <span class="cf-section-title">= FLUJO DE CAJA DE TESORERÍA</span>
        <span class="cf-section-total" style="color:${cf.fcTotal>=0?'#4ade80':'#f87171'}">${signed(cf.fcTotal)}</span>
      </div>
    </div>`;
}

// ── ANNUAL VIEW ──
function showAnnual() {
  viewMode   = 'annual';
  currentKey = null;
  document.querySelectorAll('.sb-month').forEach(el => el.classList.remove('active'));
  document.getElementById('btn-annual').classList.add('active');

  const movs = loadMovs();
  const year = new Date().getFullYear();
  document.getElementById('nav-right').textContent = `Anual ${year}`;

  let totExplIn=0, totExplOut=0, totFinIn=0, totFinOut=0;

  const rows = MK.map((m, i) => {
    const key  = `${m}-${year}`;
    const mm   = Object.values(movs[key]||{});
    if (!mm.length) return `<tr style="opacity:.3"><td>${MF[i].slice(0,3)}</td><td colspan="5" style="text-align:center;color:var(--ink-faint);font-size:11px">—</td></tr>`;

    const cf = computeCF(mm);
    totExplIn  += cf.totalExplIn;
    totExplOut += cf.totalExplOut;
    totFinIn   += cf.totalFinIn;
    totFinOut  += cf.totalFinOut;

    const cc = n => n>0?'pos':n<0?'neg':'zero';
    return `<tr onclick="selectMonth('${key}')">
      <td style="font-family:'IBM Plex Sans',sans-serif;font-weight:600">${MF[i].slice(0,3).toUpperCase()+MF[i].slice(3).toLowerCase()}</td>
      <td class="${cc(cf.totalExplIn)}">${fmtE(cf.totalExplIn)}</td>
      <td class="${cc(-cf.totalExplOut)}" style="color:var(--red)">${fmtE(cf.totalExplOut)}</td>
      <td class="${cc(cf.fcExplot)}" style="font-weight:600">${signed(cf.fcExplot)}</td>
      <td class="${cc(cf.fcFinanc)}" style="font-weight:600">${signed(cf.fcFinanc)}</td>
      <td class="${cc(cf.fcTotal)}" style="font-weight:700;font-size:13px">${signed(cf.fcTotal)}</td>
    </tr>`;
  }).join('');

  const totFcExplot = totExplIn - totExplOut;
  const totFcFinanc = totFinIn  - totFinOut;
  const totFC       = totFcExplot + totFcFinanc;
  const cc = n => n>0?'pos':n<0?'neg':'zero';
  const colorFC = n => n>=0?'var(--green)':'var(--red)';

  document.getElementById('main-inner').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Tesorería Anual — ${year}</div>
        <div class="page-sub">Flujo de caja acumulado · click en un mes para ver el detalle</div>
      </div>
    </div>

    <div class="summary-row">
      <div class="sum-card" style="border-left-color:${colorFC(totFcExplot)}">
        <div class="sum-card-label">FC Explotación anual</div>
        <div class="sum-card-val" style="color:${colorFC(totFcExplot)}">${signed(totFcExplot)}</div>
        <div class="sum-card-sub">${fmtE(totExplIn)} cobros · ${fmtE(totExplOut)} pagos</div>
      </div>
      <div class="sum-card" style="border-left-color:${colorFC(totFcFinanc)}">
        <div class="sum-card-label">FC Financiación anual</div>
        <div class="sum-card-val" style="color:${colorFC(totFcFinanc)}">${signed(totFcFinanc)}</div>
        <div class="sum-card-sub">${fmtE(totFinIn)} entradas · ${fmtE(totFinOut)} devoluc.</div>
      </div>
      <div class="sum-card" style="border-left-color:${colorFC(totFC)};${totFC>=0?'background:var(--green-bg)':'background:var(--red-bg)'}">
        <div class="sum-card-label">FC Total anual</div>
        <div class="sum-card-val" style="color:${colorFC(totFC)};font-size:26px">${signed(totFC)}</div>
        <div class="sum-card-sub">${totFC>=0?'Generación positiva de caja':'Consumo neto de caja'}</div>
      </div>
    </div>

    <div class="annual-wrap">
      <table class="annual-tbl">
        <thead><tr>
          <th style="text-align:left">Mes</th>
          <th>Cobros explot.</th>
          <th>Pagos explot.</th>
          <th>FC Explotación</th>
          <th>FC Financiación</th>
          <th>FC TOTAL</th>
        </tr></thead>
        <tbody>
          ${rows}
          <tr class="total-row">
            <td style="font-family:'IBM Plex Sans',sans-serif">TOTAL ${year}</td>
            <td class="${cc(totExplIn)}">${fmtE(totExplIn)}</td>
            <td style="color:var(--red)">${fmtE(totExplOut)}</td>
            <td class="${cc(totFcExplot)}" style="font-weight:700">${signed(totFcExplot)}</td>
            <td class="${cc(totFcFinanc)}" style="font-weight:700">${signed(totFcFinanc)}</td>
            <td class="${cc(totFC)}" style="font-weight:700;font-size:13px">${signed(totFC)}</td>
          </tr>
        </tbody>
      </table>
    </div>`;
}
</script>
</body>
</html>
