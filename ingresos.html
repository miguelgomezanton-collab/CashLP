<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingresos Mensuales — LPCash</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f7f5; --surface:#ffffff; --surface2:#f2f2ef; --surface3:#eaeae6;
  --border:#e0dfd9; --border-strong:#c8c7c0;
  --ink:#1a1a18; --ink-dim:#6b6b65; --ink-faint:#a8a8a2;
  --green:#1a6b3c; --green-bg:#eaf4ee; --green-border:#b8ddc6;
  --red:#c0392b; --red-bg:#fdf0ee;
  --blue:#1a4a8a; --blue-bg:#eef3fc; --blue-border:#b8cef0; --blue-mid:#2563c4;
  --amber:#9a5a00; --amber-bg:#fdf5e6; --amber-border:#f0d090;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;font-size:14px;min-height:100vh;display:flex;flex-direction:column}

/* NAV */
nav{background:var(--ink);color:white;height:52px;padding:0 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0}
.nav-left{display:flex;align-items:center;gap:16px}
.nav-back{font-family:'IBM Plex Mono',monospace;font-size:11px;color:rgba(255,255,255,.45);cursor:pointer;padding:4px 0;transition:color .15s;text-decoration:none}
.nav-back:hover{color:rgba(255,255,255,.8)}
.nav-sep{color:rgba(255,255,255,.2)}
.nav-title{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;letter-spacing:.04em}
.nav-right{font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,.35)}

/* LAYOUT */
.layout{display:flex;flex:1;min-height:0}

/* SIDEBAR */
.sidebar{width:196px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-head{padding:16px 16px 12px;border-bottom:1px solid var(--border)}
.sb-head-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:2px}
.sb-head-sub{font-size:11px;color:var(--ink-dim)}
.sb-months{flex:1;overflow-y:auto;padding:8px 0}
.sb-section-label{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);padding:10px 16px 4px}
.sb-month{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;cursor:pointer;font-size:12px;color:var(--ink-dim);transition:background .1s;border-left:2px solid transparent}
.sb-month:hover{background:var(--surface2);color:var(--ink)}
.sb-month.active{background:var(--blue-bg);color:var(--blue);border-left-color:var(--blue);font-weight:600}
.sb-month.has-proj{color:var(--ink)}
.sb-month-right{display:flex;align-items:center;gap:5px}
.sb-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);flex-shrink:0}
.sb-dot.green{background:var(--green)}
.sb-dot.empty{background:var(--border-strong)}
.sb-pct{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--ink-faint)}
.sb-month.active .sb-pct{color:var(--blue)}
.sb-bottom{padding:12px 16px;border-top:1px solid var(--border)}
.sb-annual-btn{width:100%;padding:8px 10px;background:transparent;border:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-dim);cursor:pointer;border-radius:3px;transition:all .15s;text-align:left}
.sb-annual-btn:hover{border-color:var(--ink);color:var(--ink)}
.sb-annual-btn.active{background:var(--ink);color:white;border-color:var(--ink)}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:0}
.main-inner{max-width:900px;padding:24px 28px 60px}

/* PAGE HEADER */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px}
.page-title{font-size:20px;font-weight:700;line-height:1}
.page-sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-faint);margin-top:5px}

/* ALERT */
.alert{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-radius:4px;font-size:12px;line-height:1.6;margin-bottom:18px}
.alert.info{background:var(--blue-bg);border:1px solid var(--blue-border);color:var(--blue)}
.alert.past{background:var(--surface2);border:1px solid var(--border);color:var(--ink-dim)}
.alert-icon{flex-shrink:0;font-size:13px;margin-top:1px}

/* TWO COLUMN LAYOUT */
.two-col{display:grid;grid-template-columns:320px 1fr;gap:20px;align-items:start}

/* PROJECTION CARD */
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:5px;overflow:hidden}
.proj-card-title{background:var(--ink);color:white;padding:11px 16px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:.05em;text-align:center}

.proj-row{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--border);min-height:38px;gap:8px}
.proj-row:last-child{border-bottom:none}
.proj-row.bold{font-weight:700}
.proj-row.total{background:var(--surface2);border-top:2px solid var(--border-strong);padding:11px 14px}
.proj-row.spacer{height:8px;background:var(--surface2);border-bottom:1px solid var(--border);padding:0}
.proj-label{font-size:12px;color:var(--ink-dim);line-height:1.4}
.proj-row.bold .proj-label{color:var(--ink)}
.proj-row.total .proj-label{color:var(--ink);font-size:13px}
.proj-value{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:var(--ink);text-align:right;white-space:nowrap}
.proj-value.blue{color:#1a4ab0}
.proj-value.total-val{font-size:15px}

/* INPUT */
.proj-input{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:#1a4ab0;border:none;border-bottom:2px solid var(--blue-border);background:transparent;outline:none;text-align:right;width:100px;padding:2px 4px;transition:border-color .15s}
.proj-input:focus{border-bottom-color:#1a4ab0;background:var(--blue-bg);border-radius:2px 2px 0 0}
.proj-input.pct{width:60px}
.proj-input[readonly]{border-bottom-color:transparent;pointer-events:none}

/* SAVE BTN */
.save-btn{width:100%;padding:11px;background:var(--ink);color:white;border:none;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;cursor:pointer;letter-spacing:.05em;transition:background .15s}
.save-btn:hover{background:#2a2a28}
.locked-bar{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;background:var(--green-bg);border-top:1px solid var(--green-border)}
.locked-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--green);display:flex;align-items:center;gap:6px}
.locked-hint{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--ink-faint)}

/* REAL PANEL */
.real-panel{display:flex;flex-direction:column;gap:14px}

/* KPI ROW */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:14px 16px;border-left:3px solid var(--border)}
.kpi-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:7px}
.kpi-val{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;line-height:1;color:var(--ink)}
.kpi-sub{font-size:11px;color:var(--ink-dim);margin-top:4px}

/* GAUGE CARD */
.gauge-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:20px}

/* PROGRESS BAR */
.prog-wrap{margin-bottom:4px}
.prog-labels{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-faint);margin-bottom:5px}
.prog-track{height:8px;background:var(--surface3);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1)}

/* WEEKLY BARS */
.weekly-title{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:10px;padding-top:14px;border-top:1px solid var(--border);margin-top:14px}
.weekly-bars{display:flex;align-items:flex-end;gap:8px;height:80px}
.week-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end}
.week-bar{width:100%;border-radius:2px 2px 0 0;min-height:3px}
.week-lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--ink-faint)}
.week-val{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--ink-dim)}

/* STATUS ALERT */
.status-alert{padding:10px 14px;border-radius:3px;font-size:12px;display:flex;align-items:center;gap:8px}

/* PIGEONS CAPACITY CARD */
.pigeons-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden}
.pigeons-card-header{padding:10px 16px;background:#fce8e6;border-bottom:1px solid #f5c0b8;display:flex;align-items:center;justify-content:space-between}
.pigeons-card-title{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.06em;color:#a93226}
.pigeons-formula-row{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:1px solid var(--border)}
.pigeons-formula-row:last-child{border-bottom:none}
.pigeons-formula-row.result{background:var(--surface2);border-top:1px solid var(--border-strong)}
.pf-label{font-size:12px;color:var(--ink-dim);display:flex;align-items:center;gap:8px}
.pf-sign{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;width:16px;text-align:center;flex-shrink:0}
.pf-val{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600}
.pigeons-comparison{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
.pigeons-comp-item{background:var(--surface);padding:12px 14px}
.pigeons-comp-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:5px}
.pigeons-comp-val{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;line-height:1}
.pigeons-comp-sub{font-size:11px;color:var(--ink-dim);margin-top:3px}
.annual-wrap{padding:24px 28px 60px;max-width:1000px}
.annual-title{font-size:20px;font-weight:700;margin-bottom:6px}
.annual-sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-faint);margin-bottom:22px}
.annual-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.annual-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden}
.annual-tbl{width:100%;border-collapse:collapse}
.annual-tbl thead{background:var(--ink)}
.annual-tbl th{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.07em;color:rgba(255,255,255,.6);padding:10px 14px;text-align:right;font-weight:500}
.annual-tbl th:first-child{text-align:left}
.annual-tbl tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.annual-tbl tbody tr:hover{background:var(--surface2)}
.annual-tbl tbody tr.total-row{background:var(--surface2);border-top:2px solid var(--border-strong);font-weight:700;cursor:default}
.annual-tbl td{padding:9px 14px;font-size:12px;text-align:right}
.annual-tbl td:first-child{text-align:left;font-weight:600}
.mini-bar-wrap{display:flex;justify-content:flex-end;align-items:center;gap:6px}
.mini-track{width:60px;height:5px;background:var(--surface3);border-radius:3px;overflow:hidden;flex-shrink:0}
.mini-fill{height:100%;border-radius:3px}
.tag{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:2px 6px;border-radius:2px}
</style>
<script type="module">
// ════════════════════════════════════════════════════════
// FIREBASE ADAPTER
// ════════════════════════════════════════════════════════
// ════════════════════════════════════════════════════════
// FIREBASE ADAPTER — sincroniza localStorage ↔ Firestore
// Incluir este bloque al inicio del <script> en cada HTML
// ════════════════════════════════════════════════════════

const _FB_CFG = {
  apiKey: "AIzaSyAB7JtnIUPpenmeSvmbXB3coLMcrv59Gsc",
  authDomain: "lpcash-2a547.firebaseapp.com",
  projectId: "lpcash-2a547",
  storageBucket: "lpcash-2a547.firebasestorage.app",
  messagingSenderId: "283983626636",
  appId: "1:283983626636:web:775a3d0df7e89f9b4696a9"
};

let _db = null;
let _fbReady = false;

async function _initFB() {
  if (_db) return _db;
  try {
    const { initializeApp, getApps } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const { getFirestore, doc, getDoc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const app = getApps().length ? getApps()[0] : initializeApp(_FB_CFG);
    _db = { fs: getFirestore(app), doc, getDoc, setDoc };
    _fbReady = true;
    return _db;
  } catch(e) {
    console.warn('Firebase no disponible, usando solo localStorage', e);
    return null;
  }
}

// Sincronizar al iniciar — merge inteligente: gana el que tiene más datos
async function fbSync() {
  const fb = await _initFB();
  if (!fb) return;
  const keys = ['lp_movs_v3','lp_imports_v3','lp_rules_v3','lp_ingresos_v1','lp_deuda_v1'];
  for (const k of keys) {
    try {
      const snap = await fb.getDoc(fb.doc(fb.fs, 'lpcash', k));
      const localStr = localStorage.getItem(k);

      if (!snap.exists()) {
        // Nada en Firestore — subir localStorage si existe
        if (localStr) {
          try {
            const parsed = JSON.parse(localStr);
            await fb.setDoc(fb.doc(fb.fs, 'lpcash', k), { value: parsed });
          } catch(e) {}
        }
        continue;
      }

      const remoto    = snap.data().value;
      const remotoStr = JSON.stringify(remoto);

      if (!localStr) {
        // Nada en local — usar Firestore
        _origSet(k, remotoStr);
        continue;
      }

      // Ambos tienen datos — fusionar eligiendo el más completo
      try {
        const local = JSON.parse(localStr);

        // Para movimientos (objeto de objetos) — merge por mes y por hash
        if (k === 'lp_movs_v3' && typeof remoto === 'object' && typeof local === 'object') {
          const merged = { ...remoto };
          for (const mes of Object.keys(local)) {
            if (!merged[mes]) {
              merged[mes] = local[mes];
            } else {
              // Fusionar movimientos del mes — gana el que más hashes tiene
              const localMovs  = local[mes]  || {};
              const remotoMovs = merged[mes] || {};
              merged[mes] = { ...remotoMovs, ...localMovs }; // local tiene prioridad (más reciente)
            }
          }
          const mergedStr = JSON.stringify(merged);
          _origSet(k, mergedStr);
          // Subir el merge a Firestore
          await fb.setDoc(fb.doc(fb.fs, 'lpcash', k), { value: merged });
          continue;
        }

        // Para arrays (imports, rules) — usar el más largo
        if (Array.isArray(remoto) && Array.isArray(local)) {
          const winner = local.length >= remoto.length ? local : remoto;
          const winStr = JSON.stringify(winner);
          _origSet(k, winStr);
          if (local.length > remoto.length) {
            await fb.setDoc(fb.doc(fb.fs, 'lpcash', k), { value: local });
          }
          continue;
        }

        // Para objetos simples (proyecciones, deuda) — fusionar keys
        if (typeof remoto === 'object' && typeof local === 'object') {
          const merged = { ...remoto, ...local }; // local tiene prioridad
          const mergedStr = JSON.stringify(merged);
          _origSet(k, mergedStr);
          await fb.setDoc(fb.doc(fb.fs, 'lpcash', k), { value: merged });
          continue;
        }

      } catch(e) {
        // Si falla el parse, usar Firestore
        _origSet(k, remotoStr);
      }

    } catch(e) { console.warn('sync error', k, e); }
  }
}


// Guardar en localStorage + Firestore
async function fbSave(key, value) {
  const str = JSON.stringify(value);
  localStorage.setItem(key, str);
  const fb = await _initFB();
  if (!fb) return;
  try {
    await fb.setDoc(fb.doc(fb.fs, 'lpcash', key), { value });
  } catch(e) { console.warn('fbSave error', key, e); }
}

// Wrapper: reemplaza localStorage.setItem para las claves LP
const _origSet = localStorage.setItem.bind(localStorage);
const LP_KEYS = new Set(['lp_movs_v3','lp_imports_v3','lp_rules_v3','lp_ingresos_v1','lp_deuda_v1']);

localStorage.setItem = function(key, value) {
  _origSet(key, value);
  if (LP_KEYS.has(key)) {
    // Guardar en Firebase de forma asíncrona
    _initFB().then(fb => {
      if (!fb) return;
      try {
        const parsed = JSON.parse(value);
        fb.setDoc(fb.doc(fb.fs, 'lpcash', key), { value: parsed });
      } catch(e) { /* ignorar */ }
    });
  }
};

window.addEventListener('DOMContentLoaded', () => { fbSync(); });
</script>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-head">
      <div class="sb-head-label">Ingresos</div>
      <div class="sb-head-sub">Proyección vs Real</div>
    </div>
    <div class="sb-months" id="sb-months"></div>
    <div class="sb-bottom">
      <button class="sb-annual-btn" id="btn-annual" onclick="showAnnual()">📊 Resumen anual</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main-area">
    <div class="main-inner" id="main-inner">
      <!-- injected -->
    </div>

<script>
// ════════════════════════
// STORAGE
// ════════════════════════
const K_MOVS = 'lp_movs_v3';
const K_PROJ = 'lp_ingresos_v1';
const MK = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
const MF = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

const loadMovs = () => { try { return JSON.parse(localStorage.getItem(K_MOVS)||'{}'); } catch { return {}; } };
const loadProj = () => { try { return JSON.parse(localStorage.getItem(K_PROJ)||'{}'); } catch { return {}; } };
const saveProj = d => localStorage.setItem(K_PROJ, JSON.stringify(d));

const fmt  = n => new Intl.NumberFormat('es-ES',{minimumFractionDigits:0,maximumFractionDigits:0}).format(Math.round(n));
const fmtE = n => fmt(n) + '€';
const fmtP = p => (p*100).toFixed(1) + '%';
const getNum = id => parseFloat(document.getElementById(id)?.value)||0;

let currentKey = null;
let viewMode   = 'month'; // 'month' | 'annual'

// ════════════════════════
// INIT
// ════════════════════════
window.onload = () => {
  const now = new Date();
  buildSidebar();
  // Default: current month
  const key = `${MK[now.getMonth()]}-${now.getFullYear()}`;
  selectMonth(key);
};

// ════════════════════════
// SIDEBAR
// ════════════════════════
function buildSidebar() {
  const proj = loadProj();
  const movs = loadMovs();
  const now  = new Date();
  const year = now.getFullYear();

  let html = `<div class="sb-section-label">${year}</div>`;
  MK.forEach((m, i) => {
    const key   = `${m}-${year}`;
    const p     = proj[key];
    const mm    = Object.values(movs[key]||{});
    const real  = mm.filter(x=>x.cat==='Entradas clientes'&&x.importe>0).reduce((s,x)=>s+x.importe,0);
    const pct   = p?.total > 0 ? real / p.total : null;
    const label = MF[i];

    let dotClass = 'empty';
    let pctStr   = '';
    if (p?.total > 0) {
      dotClass = pct >= 1 ? 'green' : '';
      pctStr   = pct !== null ? fmtP(pct) : '—';
    }

    html += `<div class="sb-month ${currentKey===key?'active':''} ${p?'has-proj':''}" id="sbm-${key}" onclick="selectMonth('${key}')">
      <span>${label.slice(0,3).toUpperCase()+label.slice(3).toLowerCase()}</span>
      <div class="sb-month-right">
        ${pctStr ? `<span class="sb-pct">${pctStr}</span>` : ''}
        <div class="sb-dot ${dotClass}"></div>
      </div>
    </div>`;
  });

  document.getElementById('sb-months').innerHTML = html;
}

// ════════════════════════
// SELECT MONTH
// ════════════════════════
function selectMonth(key) {
  currentKey = key;
  viewMode   = 'month';
  document.getElementById('btn-annual').classList.remove('active');
  document.querySelectorAll('.sb-month').forEach(el => el.classList.remove('active'));
  document.getElementById('sbm-'+key)?.classList.add('active');
  renderMonth(key);
}

function renderMonth(key) {
  const [mon, year] = key.split('-');
  const monIdx = MK.indexOf(mon);
  const label  = MF[monIdx];
  const now    = new Date();
  const isPast = false; // allow input for all months
  const proj   = loadProj();
  const p      = proj[key];

  document.getElementById('nav-right').textContent = `${label} ${year}`;

  const html = `
    <div class="page-header">
      <div>
        <div class="page-title">Ingresos — ${label} ${year}</div>
        <div class="page-sub">${p ? 'Proyección guardada · solo lectura' : 'Introduce la proyección del mes'}</div>
      </div>
    </div>

    ${!p ? `
    <div class="alert info"><span class="alert-icon">ℹ</span>
      <span>Introduce los valores en azul para calcular la proyección de cobros de <strong>${label}</strong>. Una vez guardada no se puede modificar.</span>
    </div>` : ''}

    <div class="two-col">

      <!-- LEFT: projection form -->
      <div class="proj-card">
        <div class="proj-card-title">INGRESOS PREVISTOS ${mon}</div>

        <!-- SECTION 1 -->
        <div class="proj-row">
          <span class="proj-label">% Cobro emitidas mes anterior</span>
          <span class="proj-value blue">
            ${renderInput('pct-cobro', p?.pctCobro, isPast||!!p, 'pct')} %
          </span>
        </div>
        <div class="proj-row">
          <span class="proj-label">Facturación + IVA mes anterior</span>
          ${renderInput('fra-ant', p?.fraAnt, isPast||!!p)}
        </div>
        <div class="proj-row bold">
          <span class="proj-label">COBRO POR FACTURAS</span>
          <span class="proj-value" id="out-cobro-fra">—</span>
        </div>

        <div class="proj-row spacer"></div>

        <!-- SECTION 2 -->
        <div class="proj-row">
          <span class="proj-label">% Objetivo cobro mes ant. anterior</span>
          <span class="proj-value blue">
            ${renderInput('pct-ant', p?.pctAnt, isPast||!!p, 'pct')} %
          </span>
        </div>
        <div class="proj-row">
          <span class="proj-label">Facturación + IVA mes ant. anterior</span>
          ${renderInput('fra-ant2', p?.fraAnt2, isPast||!!p)}
        </div>
        <div class="proj-row">
          <span class="proj-label">Pendiente actual</span>
          ${renderInput('pendiente', p?.pendiente, isPast||!!p)}
        </div>
        <div class="proj-row">
          <span class="proj-label">Pendiente al <span id="lbl-pct-ant">—</span>%</span>
          <span class="proj-value" id="out-pend-pct">—</span>
        </div>
        <div class="proj-row bold">
          <span class="proj-label">DIFERENCIA = COBRO</span>
          <span class="proj-value" id="out-diferencia">—</span>
        </div>

        <div class="proj-row spacer"></div>

        <!-- SECTION 3 -->
        <div class="proj-row">
          <span class="proj-label">Pdte. meses anteriores</span>
          ${renderInput('pdte-meses', p?.pdteMeses, isPast||!!p)}
        </div>
        <div class="proj-row">
          <span class="proj-label">% Objetivo cobro</span>
          <span class="proj-value blue">
            ${renderInput('pct-pdte', p?.pctPdte, isPast||!!p, 'pct')} %
          </span>
        </div>
        <div class="proj-row bold">
          <span class="proj-label">COBRO MESES ANTERIORES</span>
          <span class="proj-value" id="out-cobro-pdte">—</span>
        </div>

        <div class="proj-row spacer"></div>

        <!-- TOTAL -->
        <div class="proj-row total">
          <span class="proj-label">TOTAL COBROS ${mon}</span>
          <span class="proj-value total-val" id="out-total">—</span>
        </div>

        <!-- FOOTER -->
        ${p
          ? `<div class="locked-bar">
               <span class="locked-label">🔒 Guardado el ${new Date(p.savedAt).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'})}</span>
               <span class="locked-hint">Solo lectura</span>
             </div>`
          : `<button class="save-btn" onclick="saveProjection('${key}')">Guardar proyección →</button>`
        }
      </div>

      <!-- RIGHT: real tracking -->
      <div class="real-panel" id="real-panel">
        <!-- injected by renderRealPanel -->
      </div>

    </div>`;

  document.getElementById('main-inner').innerHTML = html;
  recalc();
  renderRealPanel(key);

  // Wire inputs
  if (!isPast && !p) {
    ['pct-cobro','fra-ant','pct-ant','fra-ant2','pendiente','pdte-meses','pct-pdte'].forEach(id => {
      document.getElementById(id)?.addEventListener('input', recalc);
    });
  }
}

function renderInput(id, value, readonly, cls='') {
  if (readonly) {
    return `<input class="proj-input${cls?' '+cls:''}" id="${id}" value="${value||''}" readonly>`;
  }
  return `<input class="proj-input${cls?' '+cls:''}" id="${id}" type="number" min="0" step="0.01" placeholder="0" value="${value||''}">`;
}

// ════════════════════════
// RECALC
// ════════════════════════
function recalc() {
  const pctCobro  = getNum('pct-cobro') / 100;
  const fraAnt    = getNum('fra-ant');
  const pctAnt    = getNum('pct-ant') / 100;
  const fraAnt2   = getNum('fra-ant2');
  const pendiente = getNum('pendiente');
  const pdteMeses = getNum('pdte-meses');
  const pctPdte   = getNum('pct-pdte') / 100;

  const cobroFra  = fraAnt * pctCobro;
  const pendPct   = fraAnt2 * pctAnt;           // pendiente al % = sobre facturación
  const diferencia = pendiente - pendPct;
  const cobroPdte  = pdteMeses * pctPdte;
  const total      = cobroFra + diferencia + cobroPdte;

  const set = (id, val) => { const el = document.getElementById(id); if(el) el.textContent = val > 0 ? fmtE(val) : '—'; };
  set('out-cobro-fra',   cobroFra);
  set('out-pend-pct',    pendPct);
  set('out-diferencia',  diferencia > 0 ? diferencia : 0);
  set('out-cobro-pdte',  cobroPdte);
  set('out-total',       total);

  const lbl = document.getElementById('lbl-pct-ant');
  if (lbl) lbl.textContent = getNum('pct-ant') || '—';
}

// ════════════════════════
// SAVE
// ════════════════════════
function saveProjection(key) {
  const pctCobro = getNum('pct-cobro');
  const fraAnt   = getNum('fra-ant');
  if (!pctCobro || !fraAnt) {
    alert('Introduce al menos el % de cobro y la facturación del mes anterior.');
    return;
  }

  const pctAnt    = getNum('pct-ant');
  const fraAnt2   = getNum('fra-ant2');
  const pendiente = getNum('pendiente');
  const pdteMeses = getNum('pdte-meses');
  const pctPdte   = getNum('pct-pdte');

  const cobroFra   = fraAnt * (pctCobro/100);
  const pendPct    = fraAnt2 * (pctAnt/100);
  const diferencia = Math.max(pendiente - pendPct, 0);
  const cobroPdte  = pdteMeses * (pctPdte/100);
  const total      = cobroFra + diferencia + cobroPdte;

  const proj = loadProj();
  proj[key] = {pctCobro, fraAnt, pctAnt, fraAnt2, pendiente, pdteMeses, pctPdte, cobroFra, pendPct, diferencia, cobroPdte, total, savedAt: new Date().toISOString()};
  saveProj(proj);
  buildSidebar();
  renderMonth(key);
}

// ════════════════════════
// REAL PANEL
// ════════════════════════
function renderRealPanel(key) {
  const panel = document.getElementById('real-panel');
  if (!panel) return;

  const proj  = loadProj();
  const p     = proj[key];

  if (!p) {
    panel.innerHTML = `<div class="alert info" style="margin-top:0"><span class="alert-icon">ℹ</span><span>Guarda la proyección para ver el seguimiento real aquí.</span></div>`;
    return;
  }

  const movs    = loadMovs();
  const mm      = Object.values(movs[key]||{});
  const real    = mm.filter(x=>x.cat==='Entradas clientes'&&x.importe>0).reduce((s,x)=>s+x.importe,0);
  const prev    = p.total || 0;
  const pct     = prev > 0 ? real / prev : 0;
  const superado = pct >= 1;
  const desv    = real - prev;

  // Colors
  const accentColor = superado ? '#1a6b3c' : '#2563c4';
  const bgCard      = superado ? '#eaf4ee' : '#ffffff';
  const borderCard  = superado ? '#b8ddc6' : '#e0dfd9';
  const barColor    = pct>=1?'#1a6b3c':pct>=.75?'#2563c4':pct>=.5?'#9a5a00':'#c0392b';
  const barW        = Math.min(pct*100,100).toFixed(1);
  const nCobros     = mm.filter(x=>x.cat==='Entradas clientes'&&x.importe>0).length;

  // Weekly breakdown
  const byWeek = {};
  mm.filter(x=>x.cat==='Entradas clientes'&&x.importe>0).forEach(x => {
    const parts = (x.fecha||'').split('/');
    if (parts.length !== 3) return;
    const d   = new Date(parts[2], parts[1]-1, parts[0]);
    const day = d.getDate();
    const wk  = Math.ceil(day/7);
    const lbl = `Sem ${wk}`;
    byWeek[lbl] = (byWeek[lbl]||0) + x.importe;
  });
  const weekEntries = Object.entries(byWeek).sort();
  const maxW = Math.max(...weekEntries.map(([,v])=>v), 1);

  // Gauge: needle angle -90° (0%) → +90° (100%)
  const needleDeg   = -90 + Math.min(pct, 1.1) * 180;
  const arcFill     = Math.min(pct, 1) * 314.2;

  panel.innerHTML = `
    <!-- 3 KPIs -->
    <div class="kpi-row">
      <div class="kpi" style="border-left-color:#1a4a8a;background:#eef3fc">
        <div class="kpi-label">Previsto</div>
        <div class="kpi-val" style="color:#1a4a8a;font-size:17px">${fmtE(prev)}</div>
        <div class="kpi-sub">proyección del mes</div>
      </div>
      <div class="kpi" style="border-left-color:${accentColor};background:${bgCard};border-color:${borderCard}">
        <div class="kpi-label">Cobrado real</div>
        <div class="kpi-val" style="color:${accentColor};font-size:17px">${real>0?fmtE(real):'—'}</div>
        <div class="kpi-sub">${nCobros} cobros registrados</div>
      </div>
      <div class="kpi" style="border-left-color:${accentColor};background:${bgCard};border-color:${borderCard}">
        <div class="kpi-label">${superado?'Por encima':'Pendiente'}</div>
        <div class="kpi-val" style="color:${accentColor};font-size:17px">${superado?'+':''}${fmtE(Math.abs(desv))}</div>
        <div class="kpi-sub">${superado?'sobre el previsto':'de cobrar'}</div>
      </div>
    </div>

    <!-- GAUGE + PROGRESS -->
    <div class="gauge-card" style="background:${bgCard};border-color:${borderCard}">

      <!-- Gauge centrado -->
      <div style="display:flex;justify-content:center;margin-bottom:16px">
        <div style="position:relative;width:240px;height:130px">
          <svg width="240" height="130" viewBox="0 0 240 130" overflow="visible">
            <!-- track -->
            <path d="M 20 112 A 100 100 0 0 1 220 112" fill="none" stroke="${superado?'#b8ddc6':'#e0dfd9'}" stroke-width="14" stroke-linecap="round"/>
            <!-- fill -->
            <path d="M 20 112 A 100 100 0 0 1 220 112" fill="none" stroke="${accentColor}" stroke-width="14" stroke-linecap="round"
              stroke-dasharray="314.2" stroke-dashoffset="${(314.2-arcFill).toFixed(1)}"/>
            <!-- needle -->
            <line x1="120" y1="112" x2="120" y2="24" stroke="${accentColor}" stroke-width="2.5" stroke-linecap="round"
              transform="rotate(${needleDeg.toFixed(1)},120,112)"/>
            <circle cx="120" cy="112" r="5" fill="${accentColor}"/>
            <!-- labels -->
            <text x="14" y="128" font-size="10" fill="#a8a8a2" font-family="IBM Plex Mono,monospace">0%</text>
            <text x="120" y="20" font-size="10" fill="#a8a8a2" font-family="IBM Plex Mono,monospace" text-anchor="middle">50%</text>
            <text x="226" y="128" font-size="10" fill="#a8a8a2" font-family="IBM Plex Mono,monospace" text-anchor="end">100%</text>
          </svg>
          <div style="position:absolute;bottom:4px;left:50%;transform:translateX(-50%);text-align:center;white-space:nowrap">
            <div style="font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:600;color:${accentColor};line-height:1">${real>0?fmtP(pct):'—'}</div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:#a8a8a2;margin-top:2px">del previsto</div>
          </div>
        </div>
      </div>

      <!-- Progress bar -->
      <div class="prog-wrap">
        <div class="prog-labels"><span>${fmtE(real)} cobrado</span><span>${fmtE(prev)} previsto</span></div>
        <div class="prog-track"><div class="prog-fill" style="width:${barW}%;background:${barColor}"></div></div>
      </div>

      <!-- Weekly bars -->
      ${weekEntries.length > 0 ? `
      <div class="weekly-title">Cobros por semana</div>
      <div class="weekly-bars">
        ${weekEntries.map(([lbl,amt]) => {
          const h = Math.max(Math.round((amt/maxW)*64), 4);
          const op = (0.45 + (amt/maxW)*0.55).toFixed(2);
          return `<div class="week-col">
            <div class="week-val">${Math.round(amt/1000)}k€</div>
            <div class="week-bar" style="height:${h}px;background:${accentColor};opacity:${op}"></div>
            <div class="week-lbl">${lbl}</div>
          </div>`;
        }).join('')}
      </div>` : ''}

      <!-- Status alert -->
      <div class="status-alert" style="margin-top:14px;background:${superado?'#eaf4ee':pct>=.75?'#eef3fc':pct>=.5?'#fdf5e6':'#fdf0ee'};color:${superado?'#1a6b3c':pct>=.75?'#1a4a8a':pct>=.5?'#9a5a00':'#c0392b'}">
        ${superado
          ? `✓ Cobros por encima del previsto · +${fmtE(desv)} · ${fmtP(pct)}`
          : real > 0
          ? `${fmtP(pct)} cobrado · Pendiente: ${fmtE(Math.abs(desv))}`
          : `Sin cobros registrados aún en "Entradas clientes"`}
      </div>
    </div>

    ${renderPigeonsBlock(key, prev)}`;
}

// ════════════════════════
// PIGEONS CAPACITY BLOCK
// ════════════════════════
function renderPigeonsBlock(key, previsto) {
  const allMovs  = loadMovs();

  // Cats that count as "salidas fijas"
  const FIXED_CATS = ['Arrendamientos','Serv. profesionales','Seguros','Publicidad','Suministros','IT y SaaS','Sueldos','Cotizaciones','Servicios bancarios'];

  // Compute avg over all months WITH data (excluding current month)
  const months = Object.keys(allMovs).filter(k => k !== key && Object.keys(allMovs[k]||{}).length > 0);
  let avgFijas = 0;
  if (months.length > 0) {
    const totals = months.map(k => {
      const mm = Object.values(allMovs[k]);
      return mm.filter(m => FIXED_CATS.includes(m.cat) && m.importe < 0).reduce((s,m) => s + Math.abs(m.importe), 0);
    });
    avgFijas = totals.reduce((s,v) => s+v, 0) / totals.length;
  } else {
    // Fallback: use current month's own fijas if no other months
    const mm = Object.values(allMovs[key] || {});
    avgFijas = mm.filter(m => FIXED_CATS.includes(m.cat) && m.importe < 0).reduce((s,m) => s + Math.abs(m.importe), 0);
  }

  const capacidadPrevista = Math.max(previsto - avgFijas, 0);
  const nMonths = months.length;

  // Real PIGEONS this month
  const mm = Object.values(allMovs[key] || {});
  const pigeonsReales = Math.abs(mm.filter(m => m.cat === 'PIGEONS' && m.importe < 0).reduce((s,m) => s+m.importe, 0));
  const pigeonsEntradas = mm.filter(m => m.cat === 'PIGEONS' && m.importe > 0).reduce((s,m) => s+m.importe, 0);
  const desviacion = capacidadPrevista - pigeonsReales;
  const hayReales  = pigeonsReales > 0;

  const colorCap  = capacidadPrevista > 0 ? '#1a6b3c' : '#c0392b';
  const colorDesv = desviacion >= 0 ? '#1a6b3c' : '#c0392b';

  return `
    <div class="pigeons-card">
      <div class="pigeons-card-header">
        <span class="pigeons-card-title">PIGEONS — Capacidad de pago prevista</span>
        ${nMonths > 0 ? `<span style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:#a93226;opacity:.7">Media ${nMonths} mes${nMonths!==1?'es':''} anteriores</span>` : ''}
      </div>

      <!-- Formula -->
      <div class="pigeons-formula-row">
        <span class="pf-label"><span class="pf-sign" style="color:#2563c4">+</span>Cobros previstos del mes</span>
        <span class="pf-val" style="color:#2563c4">${previsto > 0 ? fmtE(previsto) : '—'}</span>
      </div>
      <div class="pigeons-formula-row">
        <span class="pf-label"><span class="pf-sign" style="color:#c0392b">−</span>Salidas fijas promedio <span style="font-size:10px;color:var(--ink-faint)">(Estructura+RRHH+S.Banc.)</span></span>
        <span class="pf-val" style="color:#c0392b">${fmtE(avgFijas)}</span>
      </div>
      <div class="pigeons-formula-row result">
        <span class="pf-label" style="font-weight:700;color:var(--ink)">= Capacidad pago PIGEONS</span>
        <span class="pf-val" style="color:${colorCap};font-size:15px">${fmtE(capacidadPrevista)}</span>
      </div>

      <!-- Comparison previsto vs real -->
      <div class="pigeons-comparison">
        <div class="pigeons-comp-item">
          <div class="pigeons-comp-label">Capacidad prevista</div>
          <div class="pigeons-comp-val" style="color:#2563c4">${fmtE(capacidadPrevista)}</div>
          <div class="pigeons-comp-sub">según proyección</div>
        </div>
        <div class="pigeons-comp-item">
          <div class="pigeons-comp-label">PIGEONS reales pagados</div>
          <div class="pigeons-comp-val" style="color:${hayReales?'#c0392b':'var(--ink-faint)'}">${hayReales ? fmtE(pigeonsReales) : '—'}</div>
          <div class="pigeons-comp-sub">${hayReales ? `${desviacion>=0?'Dentro':'Por encima'} de capacidad` : 'Sin pagos a PIGEONS aún'}</div>
        </div>
      </div>

      ${hayReales && capacidadPrevista > 0 ? `
      <div style="padding:9px 14px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:11px">
        <span style="color:var(--ink-dim)">Desviación sobre capacidad</span>
        <span style="color:${colorDesv};font-weight:600">${desviacion>=0?'+':''}${fmtE(desviacion)} ${desviacion>=0?'disponible':'por encima'}</span>
      </div>` : ''}

      ${pigeonsEntradas > 0 ? `
      <div style="padding:9px 14px;border-top:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-dim);display:flex;justify-content:space-between">
        <span>Cobros recibidos de PIGEONS</span>
        <span style="color:#1a6b3c;font-weight:600">+${fmtE(pigeonsEntradas)}</span>
      </div>` : ''}
    </div>`;
}

function showAnnual() {

  let totalPrev = 0, totalReal = 0;

  const rows = MK.map((m, i) => {
    const key  = `${m}-${year}`;

    const mm   = Object.values(movs[key]||{});
    const prev = p?.total || 0;
    const real = mm.filter(x=>x.cat==='Entradas clientes'&&x.importe>0).reduce((s,x)=>s+x.importe,0);
    const pct  = prev > 0 ? real/prev : null;
    totalPrev += prev;

    const color  = !prev?'var(--ink-faint)':pct>=1?'#1a6b3c':pct>=.75?'#2563c4':pct>=.5?'#9a5a00':'#c0392b';

      <td class="mini-bar-wrap">

      </td>
      <td style="font-family:'IBM Plex Mono',monospace;color:${prev&&real?(real>=prev?'#1a6b3c':'#c0392b'):'var(--ink-faint)'}">${prev&&real?((real-prev>=0?'+':'')+fmtE(real-prev)):'—'}</td>

  }).join('');

  const totPct   = totalPrev > 0 ? totalReal/totalPrev : null;
  const totColor = totPct===null?'var(--ink-faint)':totPct>=1?'#1a6b3c':totPct>=.75?'#2563c4':totPct>=.5?'#9a5a00':'#c0392b';

  document.getElementById('nav-right').textContent = `Resumen ${year}`;
  document.getElementById('main-inner').innerHTML = `
    <div class="page-header">

        <div class="page-sub">Previsto vs real · click en un mes para ver el detalle</div>
      </div>
    </div>

    <div class="annual-kpis">
      <div class="kpi" style="border-left-color:#1a4a8a;background:#eef3fc">
        <div class="kpi-label">Previsto anual</div>
        <div class="kpi-val" style="color:#1a4a8a;font-size:17px">${totalPrev?fmtE(totalPrev):'—'}</div>
        <div class="kpi-sub">suma proyecciones</div>
      </div>
      <div class="kpi" style="border-left-color:#1a6b3c">
        <div class="kpi-label">Cobrado real</div>
        <div class="kpi-val" style="color:#1a6b3c;font-size:17px">${totalReal?fmtE(totalReal):'—'}</div>
        <div class="kpi-sub">de extractos importados</div>
      </div>
      <div class="kpi" style="border-left-color:${totColor}">
        <div class="kpi-label">% Cumplimiento</div>
        <div class="kpi-val" style="color:${totColor};font-size:17px">${totPct!==null?fmtP(totPct):'—'}</div>
        <div class="kpi-sub">real / previsto</div>
      </div>
      <div class="kpi" style="border-left-color:${totalReal>=totalPrev?'#1a6b3c':'#c0392b'}">
        <div class="kpi-label">Desviación</div>
        <div class="kpi-val" style="color:${totalReal>=totalPrev?'#1a6b3c':'#c0392b'};font-size:17px">${totalPrev?(totalReal-totalPrev>=0?'+':'')+fmtE(totalReal-totalPrev):'—'}</div>
        <div class="kpi-sub">real − previsto</div>
      </div>
    </div>

    <div class="annual-table-wrap">
      <table class="annual-tbl">
        <thead><tr>
          <th style="text-align:left">Mes</th>
          <th>Previsto</th>
          <th>Real cobrado</th>
          <th>% Logro</th>
          <th>Progreso</th>
          <th>Desviación</th>
        </tr></thead>
        <tbody>
          ${rows}
          <tr class="total-row">
            <td>TOTAL ${year}</td>
            <td style="font-family:'IBM Plex Mono',monospace">${totalPrev?fmtE(totalPrev):'—'}</td>
            <td style="font-family:'IBM Plex Mono',monospace;color:#1a6b3c">${totalReal?fmtE(totalReal):'—'}</td>
            <td style="font-family:'IBM Plex Mono',monospace;color:${totColor}">${totPct!==null?fmtP(totPct):'—'}</td>
            <td></td>
            <td style="font-family:'IBM Plex Mono',monospace;color:${totalReal>=totalPrev?'#1a6b3c':'#c0392b'}">${totalPrev?(totalReal-totalPrev>=0?'+':'')+fmtE(totalReal-totalPrev):'—'}</td>
          </tr>
        </tbody>
      </table>
    </div>`;
}
</script>
</body>
</html>
